<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV-Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@400;700&family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="cv-core.js"></script>
<script src="default-cv.js"></script>
<style>
/* ====== RESET ====== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --c-bg: #f7f8fa; --c-surface: #ffffff; --c-border: #e4e7ec;
  --c-muted: #8a93a2; --c-text: #1a1d23; --c-accent: #2563eb;
  --c-accent-lt: #eff4ff; --c-danger: #dc2626; --c-success: #16a34a;
  --radius: 8px; --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --transition: .15s ease; --sidebar-w: 340px;
}
html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: var(--c-bg); color: var(--c-text); font-size: 14px; line-height: 1.5; }

/* ====== LAYOUT ====== */
#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
#topbar {
  display: flex; align-items: center; flex-wrap: wrap; gap: 6px 10px; padding: 7px 16px;
  min-height: 52px; background: var(--c-surface); border-bottom: 1px solid var(--c-border);
  flex-shrink: 0; z-index: 10;
}
#topbar::-webkit-scrollbar { display: none; }
#topbar .logo { font-weight: 700; font-size: 15px; letter-spacing: -.5px; color: var(--c-accent); white-space: nowrap; margin-right: 4px; }
#topbar .sep { width: 1px; height: 22px; background: var(--c-border); flex-shrink: 0; }
#topbar .spacer { flex: 1; min-width: 8px; }
#topbar label { font-size: 11px; color: var(--c-muted); white-space: nowrap; }
#topbar select { padding: 5px 8px; border: 1px solid var(--c-border); border-radius: var(--radius); font-size: 12px; background: white; color: var(--c-text); }
#topbar #cv-select { max-width: 180px; font-weight: 600; }
#topbar button:disabled { opacity: .45; cursor: not-allowed; }
.workspace { display: flex; flex: 1; overflow: hidden; }
#editor-panel {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--c-surface); border-right: 1px solid var(--c-border);
  display: flex; flex-direction: column; overflow: hidden;
}
#editor-tabs { display: flex; border-bottom: 1px solid var(--c-border); flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
#editor-tabs::-webkit-scrollbar { display: none; }
.etab { padding: 10px 12px; font-size: 11px; font-weight: 500; color: var(--c-muted); border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; transition: var(--transition); }
.etab:hover { color: var(--c-text); }
.etab.active { color: var(--c-accent); border-bottom-color: var(--c-accent); }
#editor-body { flex: 1; overflow-y: auto; padding: 14px; }
#preview-panel { flex: 1; background: #d1d5db; display: flex; flex-direction: column; overflow: hidden; }
#preview-bar { padding: 6px 14px; background: #374151; flex-shrink: 0; }
#preview-bar span { color: #9ca3af; font-size: 11px; }
#preview-scroller { flex: 1; overflow: auto; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
/* preview-fit traegt die skalierte Groesse (Layout-Box), cv-preview die echte A4-Box.
   Auf dem Desktop (Skala 1) verhaelt es sich wie ein einfacher Wrapper. */
#preview-fit { flex-shrink: 0; }
#cv-preview { background: white; width: 794px; min-height: 1123px; position: relative; font-family: 'Inter', system-ui, sans-serif; --cv-ink: #1a1a1a; color: var(--cv-ink); transform-origin: top left; }

/* ====== MOBILE-UMSCHALTER (Bearbeiten / Vorschau) ====== */
#mobile-switch { display: none; gap: 6px; padding: 8px 12px; background: var(--c-surface); border-bottom: 1px solid var(--c-border); flex-shrink: 0; }
#mobile-switch .mob-tab { flex: 1; padding: 9px 12px; border: 1px solid var(--c-border); background: white; color: var(--c-muted); font-size: 13px; font-weight: 600; border-radius: var(--radius); cursor: pointer; transition: var(--transition); }
#mobile-switch .mob-tab.active { background: var(--c-accent); color: white; border-color: var(--c-accent); }

/* ====== BUTTONS ====== */
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 12px; font-weight: 500; transition: var(--transition); white-space: nowrap; }
.btn-primary { background: var(--c-accent); color: white; }
.btn-primary:hover { background: #1d4ed8; }
.btn-ghost { background: transparent; color: var(--c-text); border: 1px solid var(--c-border); }
.btn-ghost:hover { background: var(--c-bg); }
.btn-danger { background: #fef2f2; color: var(--c-danger); border: 1px solid #fecaca; }
.btn-danger:hover { background: #fee2e2; }
.btn-sm { padding: 3px 9px; font-size: 11px; }

/* ====== FORM FIELDS ====== */
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--c-muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .4px; }
.field input, .field textarea, .field select { width: 100%; padding: 7px 9px; border: 1px solid var(--c-border); border-radius: var(--radius); font-size: 12px; font-family: inherit; color: var(--c-text); background: white; transition: var(--transition); }
.field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--c-accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.field textarea { resize: vertical; min-height: 65px; }

/* ====== CARDS ====== */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--c-muted); }
.card { border: 1px solid var(--c-border); border-radius: var(--radius); padding: 10px; margin-bottom: 8px; background: white; cursor: grab; transition: box-shadow var(--transition); }
.card:hover { box-shadow: var(--shadow-sm); }
.card.dragging { opacity: .5; }
.card.drag-over { border-color: var(--c-accent); box-shadow: 0 0 0 2px rgba(37,99,235,.2); }
.card-header { display: flex; align-items: center; }
.card-title { font-size: 12px; font-weight: 600; }
.card-sub { font-size: 10px; color: var(--c-muted); margin-top: 2px; }
.card-actions { display: flex; gap: 4px; margin-left: auto; flex-shrink: 0; }
.card-body { margin-top: 10px; display: none; }
.card-body.open { display: block; }
.drag-handle { color: var(--c-muted); cursor: grab; padding: 2px 6px; font-size: 15px; user-select: none; }
.tag-input-wrap { display: flex; gap: 5px; }
.tags-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
.tag { display: inline-flex; align-items: center; gap: 3px; background: var(--c-accent-lt); color: var(--c-accent); border: 1px solid #bfdbfe; border-radius: 4px; padding: 2px 7px; font-size: 11px; }
.tag-rm { cursor: pointer; font-size: 13px; opacity: .6; }
.tag-rm:hover { opacity: 1; }
.skill-edit-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.skill-edit-name { flex: 1; font-size: 12px; color: var(--c-text); }
.skill-edit-rate { width: 92px; flex-shrink: 0; padding: 3px 5px; border: 1px solid var(--c-border); border-radius: var(--radius); font-size: 11px; background: white; }
.bullet-list { list-style: none; }
.bullet-item { display: flex; gap: 5px; margin-bottom: 5px; align-items: flex-start; }
.bullet-item textarea { flex: 1; }
.bullet-rm { color: var(--c-danger); cursor: pointer; font-size: 15px; padding: 5px 3px; flex-shrink: 0; }
.add-section-btn { width: 100%; padding: 9px; border: 1px dashed var(--c-border); border-radius: var(--radius); background: transparent; color: var(--c-muted); font-size: 12px; cursor: pointer; text-align: center; transition: var(--transition); }
.add-section-btn:hover { border-color: var(--c-accent); color: var(--c-accent); background: var(--c-accent-lt); }
.photo-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; object-position: center top; border: 2px solid var(--c-border); display: block; margin: 8px auto; }
.photo-placeholder { width: 80px; height: 80px; border-radius: 50%; background: var(--c-bg); border: 2px dashed var(--c-border); display: flex; align-items: center; justify-content: center; margin: 8px auto; color: var(--c-muted); font-size: 11px; text-align: center; cursor: pointer; }
.autosave-indicator { font-size: 11px; color: var(--c-success); white-space: nowrap; }
.autosave-indicator.saving { color: var(--c-muted); }
.hidden { display: none !important; }

/* ====== CV-LINKS (klickbar, visuell unauffaellig) ====== */
.cv-link { color: inherit; text-decoration: none; }

/* ====== PORTFOLIO-HERVORHEBUNG ======
   Minimalistisch und modern: kleines Globus-Icon + dezentes Label, ohne schwere
   Pille. Passt sich ueber currentColor an jede Vorlage (hell/dunkel) an und bleibt
   gut erkennbar - leicht, elegant, einheitlich in allen Vorlagen. */
.cv-link.cv-portfolio {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-weight: 600;
  letter-spacing: .2px;
  text-decoration: none;
  white-space: nowrap;
}
.cv-link.cv-portfolio .cv-icon { display: inline-flex; }
.cv-link.cv-portfolio .cv-icon svg { width: 1.05em; height: 1.05em; display: block; fill: currentColor; opacity: .92; }

/* ====== KOMPAKTE SOCIAL-ICONS (LinkedIn / GitHub) ======
   Spart Platz: zeigt das Icon statt der langen URL. Passt sich ueber
   currentColor an helle und dunkle Vorlagen an; im PDF anklickbar. */
.cv-link.cv-icon { display: inline-flex; align-items: center; vertical-align: middle; }
.cv-link.cv-icon svg { width: 1.3em; height: 1.3em; display: block; fill: currentColor; }

/* ====== PROJEKT-LINK (optional, je Projekt) ====== */
.cv-link.cv-proj-link {
  display: inline-block;
  font-weight: 600;
  font-size: .9em;
  text-decoration: none;
  border: 1px solid currentColor;
  border-radius: 4px;
  padding: 0 6px;
  margin-left: 6px;
  opacity: .9;
  white-space: nowrap;
}

/* ====== TEMPLATE: MINIMAL ====== */
.tpl-minimal { padding: 34px 44px; font-family: inherit; color: var(--cv-ink); font-size: 12px; line-height: 1.5; }
.tpl-minimal .cv-name { font-size: 27px; font-weight: 700; letter-spacing: -.5px; margin-bottom: 3px; }
.tpl-minimal .cv-jobtitle { font-size: 13px; color: var(--cv-ink); margin-bottom: 14px; }
.tpl-minimal .cv-contact-bar { display: flex; flex-wrap: wrap; gap: 5px 18px; border-top: 1px solid #e4e7ec; border-bottom: 1px solid #e4e7ec; padding: 9px 0; margin-bottom: 26px; font-size: 11.5px; color: var(--cv-ink); }
.tpl-minimal .cv-photo-wrap { float: right; margin: 0 0 10px 16px; }
.tpl-minimal .cv-section { margin-bottom: 20px; }
.tpl-minimal .cv-section-title { font-size: 12.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #2563eb; margin-bottom: 9px; padding-bottom: 4px; border-bottom: 1px solid #bfdbfe; }
.tpl-minimal .cv-entry { margin-bottom: 13px; }
.tpl-minimal .cv-entry-header { display: flex; justify-content: space-between; align-items: baseline; }
.tpl-minimal .cv-entry-title { font-weight: 600; font-size: 12.5px; }
.tpl-minimal .cv-entry-date { font-size: 11.5px; color: var(--cv-ink); white-space: nowrap; margin-left: 8px; }
.tpl-minimal .cv-entry-sub { font-size: 11.5px; color: #2563eb; font-weight: 500; margin-bottom: 3px; }
.tpl-minimal .cv-bullets { padding-left: 13px; margin-top: 3px; }
.tpl-minimal .cv-bullets li { margin-bottom: 2px; font-size: 11.5px; }
.tpl-minimal .skill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.tpl-minimal .skill-cat-name { font-size: 11.5px; font-weight: 600; color: var(--cv-ink); margin-bottom: 3px; }
.tpl-minimal .skill-tags { display: flex; flex-wrap: wrap; gap: 3px; }
.tpl-minimal .skill-tag { background: #f3f4f6; border-radius: 3px; padding: 2px 6px; font-size: 11px; color: var(--cv-ink); }
.tpl-minimal .lang-row { display: flex; flex-wrap: wrap; gap: 4px 14px; }
.tpl-minimal .lang-item { font-size: 11.5px; }
.tpl-minimal .lang-level { color: var(--cv-ink); }
.tpl-minimal .tech-stack { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
.tpl-minimal .tech-badge { background: #eff6ff; color: #1d4ed8; border-radius: 3px; padding: 2px 6px; font-size: 11px; font-weight: 500; }

/* ====== TEMPLATE: SIDEBAR ====== */
.tpl-sidebar { display: flex; min-height: 1123px; font-family: inherit; font-size: 12px; line-height: 1.5; }
.tpl-sidebar .cv-left { width: 216px; flex-shrink: 0; background: #1e293b; color: #e2e8f0; padding: 28px 18px; }
.tpl-sidebar .cv-right { flex: 1; padding: 28px 28px; color: var(--cv-ink); }
.tpl-sidebar .cv-name { font-size: 20px; font-weight: 700; text-align: center; color: #f1f5f9; margin-bottom: 3px; line-height: 1.25; }
.tpl-sidebar .cv-jobtitle { font-size: 11.5px; color: #94a3b8; text-align: center; margin-bottom: 18px; }
.tpl-sidebar .left-section { margin-bottom: 18px; }
.tpl-sidebar .left-section-title { font-size: 12.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #64748b; margin-bottom: 7px; padding-bottom: 4px; border-bottom: 1px solid #334155; }
.tpl-sidebar .contact-item { font-size: 11.5px; color: #cbd5e1; margin-bottom: 4px; word-break: break-word; }
.tpl-sidebar .contact-label { color: #64748b; font-size: 11px; display: block; }
.tpl-sidebar .left-skill-cat { margin-bottom: 9px; }
.tpl-sidebar .left-skill-cat-name { font-size: 11px; font-weight: 600; color: #94a3b8; margin-bottom: 3px; }
.tpl-sidebar .left-skill-tag { display: inline-block; background: #334155; color: #cbd5e1; border-radius: 3px; padding: 2px 5px; font-size: 11px; margin: 1px 1px 0 0; }
.tpl-sidebar .lang-item { font-size: 11.5px; color: #cbd5e1; margin-bottom: 3px; }
.tpl-sidebar .lang-level { color: #64748b; font-size: 11px; }
.tpl-sidebar .cv-section { margin-bottom: 18px; }
.tpl-sidebar .cv-section-title { font-size: 12.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #2563eb; margin-bottom: 9px; padding-bottom: 3px; border-bottom: 2px solid #bfdbfe; }
.tpl-sidebar .cv-entry { margin-bottom: 12px; }
.tpl-sidebar .cv-entry-header { display: flex; justify-content: space-between; align-items: baseline; }
.tpl-sidebar .cv-entry-title { font-weight: 600; font-size: 12.5px; }
.tpl-sidebar .cv-entry-date { font-size: 11.5px; color: var(--cv-ink); white-space: nowrap; margin-left: 8px; }
.tpl-sidebar .cv-entry-sub { font-size: 11.5px; color: #2563eb; font-weight: 500; margin-bottom: 3px; }
.tpl-sidebar .cv-bullets { padding-left: 13px; margin-top: 3px; }
.tpl-sidebar .cv-bullets li { margin-bottom: 2px; font-size: 11.5px; }
.tpl-sidebar .tech-badge { display: inline-block; background: #eff6ff; color: #1d4ed8; border-radius: 3px; padding: 2px 6px; font-size: 11px; font-weight: 500; margin: 2px 2px 0 0; }

/* ====== TEMPLATE: KLASSISCH DACH ====== */
.tpl-dach { padding: 32px 40px; font-family: inherit; color: var(--cv-ink); font-size: 12px; line-height: 1.5; }
.tpl-dach .cv-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
.tpl-dach .cv-header-left { flex: 1; }
.tpl-dach .cv-name { font-size: 24px; font-weight: 700; letter-spacing: -.3px; margin-bottom: 2px; font-family: inherit; }
.tpl-dach .cv-jobtitle { font-size: 13px; color: var(--cv-ink); margin-bottom: 10px; font-style: italic; }
.tpl-dach .cv-contact-block { font-size: 11.5px; color: var(--cv-ink); line-height: 1.75; }
.tpl-dach .cv-rule { border: none; border-top: 2px solid #1a1a1a; margin: 14px 0 18px; }
.tpl-dach .cv-section { margin-bottom: 16px; }

.tpl-dach .cv-section-label h3 { font-size: 12.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--cv-ink); }
.tpl-dach .cv-section-content { flex: 1; border-left: 1px solid #e0e0e0; padding-left: 14px; }
.tpl-dach .cv-entry { margin-bottom: 13px; }
.tpl-dach .cv-entry-header { display: flex; justify-content: space-between; align-items: baseline; }
.tpl-dach .cv-entry-title { font-weight: 700; font-size: 12.5px; }
.tpl-dach .cv-entry-date { font-size: 11.5px; color: var(--cv-ink); white-space: nowrap; margin-left: 8px; }
.tpl-dach .cv-entry-sub { font-size: 11.5px; color: var(--cv-ink); font-style: italic; margin-bottom: 3px; }
.tpl-dach .cv-bullets { padding-left: 13px; margin-top: 3px; }
.tpl-dach .cv-bullets li { margin-bottom: 2px; font-size: 11.5px; }
.tpl-dach .skill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.tpl-dach .skill-cat-name { font-weight: 700; font-size: 11.5px; color: var(--cv-ink); margin-bottom: 2px; }
.tpl-dach .skill-items { font-size: 11.5px; color: var(--cv-ink); }
.tpl-dach .lang-row { display: flex; flex-wrap: wrap; gap: 4px 18px; }
.tpl-dach .lang-item { font-size: 11.5px; }
.tpl-dach .lang-level { color: var(--cv-ink); font-style: italic; }
.tpl-dach .tech-stack { font-size: 11.5px; color: var(--cv-ink); margin-top: 4px; font-style: italic; }

/* ====== TEMPLATE: KREATIV HEADER ====== */
.tpl-header { font-family: inherit; color: var(--cv-ink); font-size: 12px; line-height: 1.5; min-height: 1123px; }
.tpl-header .cv-head { background: #111827; padding: 30px 40px; display: flex; align-items: center; gap: 24px; }
.tpl-header .cv-head-info { flex: 1; }
.tpl-header .cv-name { font-size: 30px; font-weight: 700; color: #f9fafb; margin-bottom: 4px; }
.tpl-header .cv-jobtitle { font-size: 13px; color: #10b981; margin-bottom: 12px; font-weight: 500; }
.tpl-header .cv-contact-bar { display: flex; flex-wrap: wrap; gap: 4px 16px; font-size: 11.5px; color: #9ca3af; }

.tpl-header .cv-section { margin-bottom: 18px; }
.tpl-header .cv-section-title { font-size: 12.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #111827; margin-bottom: 9px; padding-bottom: 3px; border-bottom: 2px solid #10b981; }
.tpl-header .cv-entry { margin-bottom: 12px; }
.tpl-header .cv-entry-header { display: flex; justify-content: space-between; align-items: baseline; }
.tpl-header .cv-entry-title { font-weight: 600; font-size: 12.5px; }
.tpl-header .cv-entry-date { font-size: 11px; color: var(--cv-ink); white-space: nowrap; margin-left: 8px; }
.tpl-header .cv-entry-sub { font-size: 11.5px; color: #10b981; font-weight: 600; margin-bottom: 3px; }
.tpl-header .cv-bullets { padding-left: 13px; margin-top: 3px; }
.tpl-header .cv-bullets li { margin-bottom: 2px; font-size: 11.5px; }
.tpl-header .left-skill-cat { margin-bottom: 10px; }
.tpl-header .left-skill-cat-name { font-size: 11.5px; font-weight: 600; color: var(--cv-ink); margin-bottom: 4px; }
.tpl-header .left-skill-tag { display: inline-block; background: #e5e7eb; color: var(--cv-ink); border-radius: 3px; padding: 2px 6px; font-size: 11px; margin: 2px 2px 0 0; }
.tpl-header .lang-item { font-size: 11.5px; color: var(--cv-ink); margin-bottom: 4px; }
.tpl-header .lang-level { color: var(--cv-ink); }
.tpl-header .tech-badge { display: inline-block; background: #ecfdf5; color: #065f46; border-radius: 3px; padding: 2px 6px; font-size: 11px; font-weight: 500; margin: 2px 2px 0 0; }
.tpl-header .pers-item { font-size: 11.5px; color: var(--cv-ink); margin-bottom: 4px; }
.tpl-header .pers-label { color: var(--cv-ink); font-size: 11px; display: block; }

/* ====== TEMPLATE: KOMPAKT ZEITACHSE ====== */
.tpl-compact { font-family: inherit; color: var(--cv-ink); font-size: 12px; line-height: 1.5; padding: 30px 40px; }
.tpl-compact .cv-header { margin-bottom: 20px; padding-bottom: 14px; border-bottom: 3px solid #2563eb; }

/* ====== RESPONSIVE: TABLET & MOBILE ====== */
/* Auf schmalen Bildschirmen passen Editor und Vorschau nicht nebeneinander.
   Beide Bereiche werden uebereinander gelegt und ueber den Mobile-Umschalter
   gewechselt. Die A4-Vorschau wird per JS (applyPreviewScale) auf die Bildschirm-
   breite skaliert - so ist die App auf JEDER Bildschirmgroesse voll nutzbar. */
@media (max-width: 900px) {
  #mobile-switch { display: flex; }
  .workspace { position: relative; }
  #editor-panel { width: 100%; border-right: none; }
  /* Standard: Editor sichtbar, Vorschau ausgeblendet (per body-Klasse gesteuert) */
  body.mob-preview #editor-panel { display: none; }
  body.mob-edit #preview-panel { display: none; }
  #preview-scroller { padding: 12px; }
  /* Topbar umbrechen statt horizontal scrollen: sonst sind Schaltflaechen am
     rechten Rand (z. B. "PDF exportieren") unsichtbar, weil die Scrollleiste
     ausgeblendet ist. Beim Umbruch bleibt JEDE Schaltflaeche erreichbar. */
  #topbar { height: auto; flex-wrap: wrap; overflow: visible; padding: 8px 10px; row-gap: 8px; }
  #topbar .spacer { display: none; }
  #topbar .sep { display: none; }
}
/* Sehr kleine Geraete (Smartphones hochkant): kompaktere Topbar-Abstaende */
@media (max-width: 560px) {
  #topbar { gap: 7px; padding: 0 10px; }
  #topbar label { display: none; }   /* Platz sparen - Selects bleiben verstaendlich */
  #editor-body { padding: 12px 12px 40px; }
}

@media print { #editor-panel, #topbar, #mobile-switch, #preview-bar { display: none !important; } #preview-fit { width: auto !important; height: auto !important; } #cv-preview { width: 100% !important; transform: none !important; } body.mob-edit #preview-panel, body.mob-preview #editor-panel { display: block !important; } }

.tpl-modern .mod-jobtitle { font-size: 22px; font-weight: 800; color: #1f2937; letter-spacing: -.3px; margin: 2px 0 0; line-height: 1.15; }
.tpl-modern .mod-head-side { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; font-size: 11.5px; flex-shrink: 0; max-width: 210px; }
.tpl-modern .mod-contact-line { display: inline-flex; align-items: center; gap: 7px; color: var(--cv-ink); text-decoration: none; word-break: break-word; }
.tpl-modern .mod-contact-line .cv-icon { display: inline-flex; flex-shrink: 0; }
.tpl-modern .mod-contact-line .cv-icon svg { width: 15px; height: 15px; fill: #3f4a5a; }
.tpl-modern .mod-band { background: #3f4a5a; color: #e5e9f0; padding: 12px 34px; display: flex; flex-wrap: wrap; gap: 4px 40px; font-size: 11.5px; }
.tpl-modern .mod-band a { color: #e5e9f0; text-decoration: none; }
.tpl-modern .mod-body { display: flex; gap: 30px; padding: 22px 34px 30px; }
.tpl-modern .mod-col-left { flex: 1.75; min-width: 0; }
.tpl-modern .mod-col-right { flex: 1; min-width: 0; }
.tpl-modern .mod-section { margin-bottom: 18px; }
.tpl-modern .mod-sec-title { font-size: 14px; font-weight: 700; color: #3f4a5a; margin: 0 0 12px; }
.tpl-modern .mod-tl-entry { position: relative; padding-left: 20px; margin-bottom: 14px; }
.tpl-modern .mod-tl-entry::before { content: ''; position: absolute; left: 0; top: 3px; width: 9px; height: 9px; border: 2px solid #3f4a5a; border-radius: 50%; background: #fff; z-index: 1; }
.tpl-modern .mod-tl-entry::after { content: ''; position: absolute; left: 4px; top: 15px; bottom: -14px; width: 1px; background: #cbd5e1; }
.tpl-modern .mod-tl-entry:last-child::after { display: none; }
.tpl-modern .mod-entry-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
.tpl-modern .mod-entry-title { font-weight: 700; font-size: 12.5px; }
.tpl-modern .mod-entry-date { font-size: 11.5px; font-style: italic; color: #64748b; white-space: nowrap; }
.tpl-modern .mod-entry-sub { font-size: 11.5px; color: var(--cv-ink); margin: 1px 0 3px; }
.tpl-modern .mod-entry-loc { font-style: italic; color: #64748b; }
.tpl-modern .cv-bullets { padding-left: 15px; margin-top: 3px; }
.tpl-modern .cv-bullets li { font-size: 11.5px; margin-bottom: 2px; color: var(--cv-ink); }
.tpl-modern .mod-proj { margin-bottom: 11px; }
.tpl-modern .mod-proj-title { font-weight: 700; font-size: 12px; }
.tpl-modern .mod-proj-stack { font-size: 11.5px; font-style: italic; font-weight: 600; color: #475569; margin: 1px 0 2px; }
.tpl-modern .mod-skill { margin-bottom: 10px; }
.tpl-modern .mod-skill-cat { font-weight: 700; font-size: 11.5px; color: #1f2937; }
.tpl-modern .mod-skill-items { font-size: 11.5px; color: var(--cv-ink); }
.tpl-modern .mod-lang { margin-bottom: 8px; }
.tpl-modern .mod-lang-name { font-weight: 700; font-size: 11.5px; }
.tpl-modern .mod-lang-level { font-size: 11.5px; color: var(--cv-ink); }
.tpl-modern .mod-int { font-weight: 600; font-size: 11.5px; margin-bottom: 7px; }
.tpl-modern .tech-badge { display: inline-block; background: #eef2f7; color: #3f4a5a; border-radius: 3px; padding: 2px 6px; font-size: 11px; font-weight: 500; margin: 3px 3px 0 0; }

<body>
<div id="app">
  <div id="topbar">
    <span class="logo">CV-Studio</span>
    <div class="sep"></div>
    <label data-i18n="ui_lang">Sprache</label>
    <select id="lang-select" onchange="setLang(this.value)" title="Sprache / Language / Langue">
      <option value="de">Deutsch</option>
      <option value="en">English</option>
      <option value="fr">Francais</option>
    </select>
    <div class="sep"></div>
    <label data-i18n="ui_lebenslauf">Lebenslauf</label>
    <select id="cv-select" onchange="switchToCv(this.value)" data-i18n-title="title_select_cv" title="Lebenslauf auswaehlen"></select>
    <button class="btn btn-ghost btn-sm" onclick="createNewCv()" data-i18n-title="title_new_cv" title="Neuen Lebenslauf anlegen" data-i18n="ui_neu">+ Neu</button>
    <button class="btn btn-ghost btn-sm" onclick="duplicateCurrentCv()" data-i18n-title="title_dup_cv" title="Aktuellen Lebenslauf duplizieren" data-i18n="ui_duplizieren">Duplizieren</button>
    <button class="btn btn-ghost btn-sm" onclick="renameCurrentCv()" data-i18n-title="title_rename_cv" title="Aktuellen Lebenslauf umbenennen" data-i18n="ui_umbenennen">Umbenennen</button>
    <button class="btn btn-danger btn-sm" onclick="deleteCurrentCv()" data-i18n-title="title_delete_cv" title="Aktuellen Lebenslauf loeschen" data-i18n="ui_loeschen">Loeschen</button>
    <div class="sep"></div>
    <label data-i18n="ui_vorlage">Vorlage</label>
    <select id="template-select" onchange="onTemplateChange(this.value)">
      <option value="minimal" data-i18n="tpl_minimal">Minimal</option>
      <option value="sidebar" data-i18n="tpl_sidebar">Sidebar-Akzent</option>
      <option value="dach" data-i18n="tpl_dach">Klassisch DACH</option>
      <option value="header" data-i18n="tpl_header">Kreativ Header</option>
      <option value="compact" data-i18n="tpl_compact">Kompakt Zeitachse</option>
      <option value="exec" data-i18n="tpl_exec">Executive</option>
      <option value="twocol" data-i18n="tpl_twocol">Zweispaltig</option>
      <option value="lineleft" data-i18n="tpl_lineleft">Seitenlinie</option>
      <option value="card" data-i18n="tpl_card">Profilkarte</option>
      <option value="plain" data-i18n="tpl_plain">Schlicht ATS</option>
      <option value="profil" data-i18n="tpl_profil">Profil Klassisch</option>
      <option value="modern" data-i18n="tpl_modern">Modern Tech</option>
    </select>
    <label data-i18n="ui_schrift">Schrift</label>
    <select id="font-select" onchange="onFontChange(this.value)">
      <option value="inter">Inter</option>
      <option value="roboto">Roboto</option>
      <option value="opensans">Open Sans</option>
      <option value="montserrat">Montserrat</option>
      <option value="lato">Lato</option>
      <option value="arial">Arial</option>
      <option value="helvetica">Helvetica Neue</option>
      <option value="calibri">Calibri</option>
      <option value="georgia">Georgia</option>
      <option value="times">Times New Roman</option>
      <option value="garamond">EB Garamond</option>
    </select>
    <label data-i18n="ui_textfarbe">Textfarbe</label>
    <input type="color" id="textcolor-input" data-i18n-title="title_textcolor" title="Textfarbe waehlen" oninput="onTextColorChange(this.value)" style="width:30px;height:26px;padding:1px;border:1px solid var(--c-border);border-radius:var(--radius);background:white;cursor:pointer;">
    <button class="btn btn-ghost btn-sm" onclick="onTextColorChange('#1a1a1a')" data-i18n-title="title_reset_black" title="Auf Schwarz zuruecksetzen" data-i18n="ui_schwarz">Schwarz</button>
    <div class="sep"></div>
    <button class="btn btn-ghost" onclick="importJSON()" data-i18n="ui_json_import">JSON importieren</button>
    <button class="btn btn-ghost" onclick="exportJSON()" data-i18n="ui_json_export">JSON exportieren</button>
    <input type="file" id="json-file-input" accept=".json" class="hidden" onchange="onJSONFileSelected(event)">
    <div class="sep"></div>
    <button class="btn btn-primary" id="pdf-btn" onclick="exportPDF()" data-i18n="ui_pdf_export">PDF exportieren</button>
    <div class="sep"></div>
    <a href="wiki.html" target="_blank" rel="noopener" class="btn btn-ghost btn-sm" data-i18n-title="title_help" title="Ausfuehrliche Anleitung oeffnen" data-i18n="ui_help">Hilfe &amp; Anleitung</a>
    <div class="spacer"></div>
    <span class="autosave-indicator" id="save-indicator" data-i18n="ui_saved">Gespeichert</span>
  </div>

  <!-- Mobile-Umschalter: nur auf kleinen Bildschirmen sichtbar (siehe Media Query).
       Erlaubt das Wechseln zwischen Bearbeiten und Vorschau, da beide Bereiche
       auf schmalen Geraeten nicht nebeneinander passen. -->
  <div id="mobile-switch">
    <button class="mob-tab active" data-view="edit" onclick="setMobileView('edit')" data-i18n="mob_edit">Bearbeiten</button>
    <button class="mob-tab" data-view="preview" onclick="setMobileView('preview')" data-i18n="mob_preview">Vorschau</button>
  </div>

  <div class="workspace">
    <div id="editor-panel">
      <div id="editor-tabs">
        <div class="etab active" onclick="showTab('personal')" data-i18n="tab_personal">${t('cv_personal')}</div>
        <div class="etab" onclick="showTab('skills')" data-i18n="tab_skills">${t('cv_skills_short')}</div>
        <div class="etab" onclick="showTab('experience')" data-i18n="tab_experience">Erfahrung</div>
        <div class="etab" onclick="showTab('education')" data-i18n="tab_education">Bildung</div>
        <div class="etab" onclick="showTab('projects')" data-i18n="tab_projects">${t('cv_projects')}</div>
        <div class="etab" onclick="showTab('languages')" data-i18n="tab_languages">${t('cv_languages')}</div>
        <div class="etab" onclick="showTab('interests')" data-i18n="tab_other">${t('cv_other')}</div>
      </div>
      <div id="editor-body"></div>
    </div>

    <div id="preview-panel">
      <div id="preview-bar"><span data-i18n="preview_bar">A4 Live-Vorschau - Aenderungen erscheinen sofort</span></div>
      <div id="preview-scroller">
        <!-- preview-fit faltet die skalierte Vorschau auf ihre sichtbare Groesse
             zusammen (kein horizontales Scrollen auf kleinen Bildschirmen).
             cv-preview behaelt seine echte A4-Breite (794px) fuer den PDF-Export. -->
        <div id="preview-fit">
          <div id="cv-preview"></div>
        </div>
      </div>
    </div>
  </div>
</div>

// Startsprache: gespeicherte Wahl des Nutzers hat Vorrang; sonst die Sprache des
// Browsers (de/en/fr), falls unterstuetzt; sonst Deutsch als Standard.
let appLang = (function(){
  try { const s = localStorage.getItem('cvstudio_lang'); if (s && (s==='de'||s==='en'||s==='fr')) return s; } catch(e){}
  const nav = ((navigator.language || navigator.userLanguage || 'de') + '').slice(0,2).toLowerCase();
  return (nav==='de'||nav==='en'||nav==='fr') ? nav : 'de';
})();
// Uebersetzung nachschlagen (Fallback: Deutsch, dann der Schluessel selbst).
function t(key) {
  const d = I18N[appLang] || I18N.de;
  return (d[key] != null) ? d[key] : (I18N.de[key] != null ? I18N.de[key] : key);
}
// Statische Beschriftungen/Tooltips im HTML (data-i18n / data-i18n-title) setzen.
function applyStaticI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('[data-i18n-title]').forEach(el => { el.title = t(el.getAttribute('data-i18n-title')); });
}
// Sprache wechseln: alles neu rendern (Oberflaeche + Lebenslauf-Beschriftungen).
function setLang(lang) {
  if (!I18N[lang]) return;
  appLang = lang;
  try { localStorage.setItem('cvstudio_lang', lang); } catch (e) {}
  document.documentElement.lang = lang;
  applyStaticI18n();
  renderEditor();
  renderPreview();
  renderCvBar();
  const ls = document.getElementById('lang-select');
  if (ls && ls.value !== lang) ls.value = lang;
}

// ====== ZUSTAND (Mehrfach-Lebenslauf) ======
// Die Daten- und Geschaeftslogik liegt in cv-core.js (Store, Models, Library).
// Hier wird nur der UI-nahe Zustand gehalten: aktiver CV im Speicher + aktiver Reiter.
const library = CVCore.createLibrary();   // Geschaeftslogik ueber localStorage
let cvData = CVCore.Models.createEmptyCv(); // Daten des aktuell bearbeiteten CV
let currentCvId = null;                     // ID des aktiven Lebenslaufs
let currentTab = 'personal';
let saveTimer = null;

// Laedt die Bibliothek beim Start: vorhandene CVs, sonst Migration des alten
// Einzel-CV, sonst ein neuer leerer Lebenslauf. Setzt cvData/currentCvId.
function initLibrary() {
  // Bei komplett leerem Speicher wird der neutrale Demo-Lebenslauf geladen
  // (window.CV_DEMO aus default-cv.js). Vorhandene Daten bleiben unberuehrt.
  const seed = (typeof window !== 'undefined' && window.CV_DEMO) ? window.CV_DEMO : null;
  currentCvId = library.ensureAtLeastOne(t('my_cv'), seed);
  const active = library.loadActive();
  currentCvId = active.id;
  cvData = active.data;
}

// Wechselt den aktiven Lebenslauf und laedt dessen Daten.
function switchToCv(id) {
  if (!library.exists(id)) return;
  library.setActive(id);
  currentCvId = id;
  cvData = library.load(id);
  currentTab = 'personal';
  renderCvBar();
  renderEditor();
  renderPreview();
  applyFont();
}

// Speichert den aktiven Lebenslauf (verzoegert) und aktualisiert die Vorschau.
function saveToStorage() {
  const ind = document.getElementById('save-indicator');
  if (ind) { ind.textContent = t('ui_saving'); ind.className = 'autosave-indicator saving'; }
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    if (currentCvId) library.save(currentCvId, cvData);
    if (ind) { ind.textContent = t('ui_saved'); ind.className = 'autosave-indicator'; }
    renderCvBar(); // aktualisiert ggf. den angezeigten Namen/Datum
  }, 600);
}
function markDirty() { saveToStorage(); renderPreview(); }

// ====== CV-VERWALTUNG (UI-Aktionen ueber die Geschaeftslogik) ======
function createNewCv() {
  const name = (prompt(t('prompt_new_name'), t('default_cv_name') + ' ' + (library.count() + 1)) || '').trim();
  if (name === '') return; // Abbruch
  const id = library.create(name);
  switchToCv(id);
}
function duplicateCurrentCv() {
  if (!currentCvId) return;
  const id = library.duplicate(currentCvId);
  if (id) switchToCv(id);
}
function renameCurrentCv() {
  if (!currentCvId) return;
  const aktuell = library.getName(currentCvId) || '';
  const name = (prompt(t('prompt_rename'), aktuell) || '').trim();
  if (name === '' || name === aktuell) return;
  library.rename(currentCvId, name);
  renderCvBar();
}
function deleteCurrentCv() {
  if (!currentCvId) return;
  const name = library.getName(currentCvId) || t('this_cv');
  if (!confirm(t('confirm_delete').replace('{name}', name))) return;
  library.remove(currentCvId);
  // Nach dem Loeschen sicherstellen, dass mindestens ein CV existiert
  currentCvId = library.ensureAtLeastOne(t('my_cv'));
  switchToCv(currentCvId);
}

// Aktualisiert die Lebenslauf-Auswahl in der oberen Leiste.
function renderCvBar() {
  const sel = document.getElementById('cv-select');
  if (!sel) return;
  const items = library.list();
  sel.innerHTML = items.map(function (it) {
    const sel2 = it.id === currentCvId ? ' selected' : '';
    return `<option value="${it.id}"${sel2}>${esc(it.name)}</option>`;
  }).join('');
  // Loeschen nur erlauben, wenn mehr als ein Lebenslauf existiert
  const delBtn = document.querySelector('[onclick="deleteCurrentCv()"]');
  if (delBtn) delBtn.disabled = items.length <= 1;
}

// ====== REITER ======
function showTab(tab) {
  currentTab = tab;
  const tabs = ['personal','skills','experience','education','projects','languages','interests'];
  document.querySelectorAll('.etab').forEach((el,i) => el.classList.toggle('active', tabs[i] === tab));
  renderEditor();
}

// ====== EDITOR ======
function renderEditor() {
  const body = document.getElementById('editor-body');
  switch(currentTab) {
    case 'personal':   body.innerHTML = renderPersonalEditor(); bindPersonal(); break;
    case 'skills':     body.innerHTML = renderSkillsEditor(); bindDragList('skills'); break;
    case 'experience': body.innerHTML = renderListEditor('experience',t('ed_experience_title'),renderExpCard); bindDragList('experience'); break;
    case 'education':  body.innerHTML = renderListEditor('education',t('ed_education_title'),renderEduCard); bindDragList('education'); break;
    case 'projects':   body.innerHTML = renderListEditor('projects',t('ed_projects_title'),renderProjectCard); bindDragList('projects'); break;
    case 'languages':  body.innerHTML = renderLanguagesEditor(); bindDragList('languages'); break;
    case 'interests':  body.innerHTML = renderInterestsEditor(); bindDragList('interests'); break;
  }
}

function bindPersonal() {
  ['name','jobtitle','address','email','phone','linkedin','github','website','birthdate','birthplace','nationality','marital'].forEach(f => {
    const el = document.getElementById('p-' + f);
    if (el) el.addEventListener('input', e => { cvData.personal[f] = e.target.value; markDirty(); });
  });
  const ps = document.getElementById('p-photoshape');
  if (ps) ps.addEventListener('change', e => { cvData.personal.photoShape = e.target.value; markDirty(); });
}
function onPhotoUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    // Originalfoto unveraendert speichern (keine Verkleinerung/Kompression) - die
    // volle Qualitaet bleibt erhalten. Fuer den PDF-Export wird daraus eine scharf
    // vorgerenderte Version erzeugt (siehe schaerfeFotosFuerCapture).
    cvData.personal.photo = ev.target.result;
    cvData.personal.photoZoom = 1;
    cvData.personal.photoPosY = 50;
    const img = new Image();
    img.onload = () => {
      cvData.personal.photoAspect = img.naturalWidth / img.naturalHeight;
      markDirty(); renderEditor();
    };
    img.src = ev.target.result;
    markDirty(); renderEditor();
  };
  reader.readAsDataURL(file);
}
function removePhoto() { cvData.personal.photo = null; cvData.personal.photoAspect = null; markDirty(); renderEditor(); }
// Foto-Groesse (Zoom) und vertikale Position anpassen - die Originaldatei bleibt
// unveraendert, nur die Darstellung im Rahmen wird angepasst.
function setPhotoZoom(v) { cvData.personal.photoZoom = (parseInt(v) || 100) / 100; markDirty(); }
function setPhotoPosY(v) { cvData.personal.photoPosY = parseInt(v); if (isNaN(cvData.personal.photoPosY)) cvData.personal.photoPosY = 50; markDirty(); }

function toggleCard(id) { const el=document.getElementById(id); if(el) el.classList.toggle('open'); }
function updateSkillCat(id,f,v) { const c=cvData.skills.find(x=>x.id===id); if(c){c[f]=v;markDirty();} }
function removeSkillCat(id) { cvData.skills=cvData.skills.filter(c=>c.id!==id); markDirty(); renderEditor(); }
function addSkillCat() { cvData.skills.push({id:uid(),category:t('ed_new_category'),items:[],ratings:{}}); markDirty(); renderEditor(); }
function addSkillTag(catId) {
  const inp=document.getElementById('sk-inp-'+catId); const v=inp.value.trim(); if(!v) return;
  const cat=cvData.skills.find(c=>c.id===catId);
  if(cat&&!cat.items.includes(v)){cat.items.push(v);markDirty();renderEditor();showTab('skills');}
  else inp.value='';
}
function removeSkillTag(catId,tag) { const c=cvData.skills.find(x=>x.id===catId); if(c){c.items=c.items.filter(i=>i!==tag); if(c.ratings) delete c.ratings[tag]; markDirty();renderEditor();} }
// Sternebewertung eines Skills setzen (0 = ohne). Wird nur in der Vorlage
// "Profil Klassisch" angezeigt; andere Vorlagen ignorieren die Bewertung.
function setSkillRating(catId,name,val) {
  const c=cvData.skills.find(x=>x.id===catId); if(!c) return;
  if(!c.ratings) c.ratings={};
  const n=parseInt(val)||0;
  if(n===0) delete c.ratings[name]; else c.ratings[name]=n;
  markDirty();
}

const LIST_DEF = {
  experience:{id:'',title:'',company:'',location:'',from:'',to:'',bullets:[]},
  education: {id:'',degree:'',institution:'',location:'',from:'',to:'',notes:''},
  projects:  {id:'',title:'',type:'',link:'',from:'',to:'',stack:[],bullets:[]},
  languages: {id:'',name:'',level:''},
  interests: {id:'',text:''}
};
function addListItem(k) { const d=JSON.parse(JSON.stringify(LIST_DEF[k]||{})); d.id=uid(); cvData[k].push(d); markDirty(); renderEditor(); }
function removeListItem(k,id) { cvData[k]=cvData[k].filter(i=>i.id!==id); markDirty(); renderEditor(); }
function updateListItem(k,id,f,v) { const it=cvData[k].find(i=>i.id===id); if(it){it[f]=v;markDirty();} }
function updateBullet(k,id,idx,v) { const it=cvData[k].find(i=>i.id===id); if(it&&it.bullets) it.bullets[idx]=v; markDirty(); }
function removeBullet(k,id,idx) { const it=cvData[k].find(i=>i.id===id); if(it&&it.bullets){it.bullets.splice(idx,1);markDirty();renderEditor();} }
function addBullet(k,id) { const it=cvData[k].find(i=>i.id===id); if(it){if(!it.bullets)it.bullets=[];it.bullets.push('');markDirty();renderEditor();} }
function addProjStack(id) {
  const inp=document.getElementById('st-inp-'+id); const v=inp.value.trim(); if(!v)return;
  const it=cvData.projects.find(i=>i.id===id);
  if(it){if(!it.stack)it.stack=[];if(!it.stack.includes(v)){it.stack.push(v);markDirty();renderEditor();}}
}
function removeProjStack(id,tech) { const it=cvData.projects.find(i=>i.id===id); if(it){it.stack=it.stack.filter(s=>s!==tech);markDirty();renderEditor();} }

// ====== DRAG & DROP ======
function bindDragList(listKey) {
  const container=document.getElementById(listKey+'-list'); if(!container)return;
  let dragSrc=null;
  container.querySelectorAll('.card[draggable]').forEach(card=>{
    card.addEventListener('dragstart',e=>{dragSrc=card;setTimeout(()=>card.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{
      card.classList.remove('dragging');
      container.querySelectorAll('.card').forEach(c=>c.classList.remove('drag-over'));
      const newOrder=Array.from(container.querySelectorAll('.card[data-id]')).map(c=>c.dataset.id);
      cvData[listKey]=newOrder.map(id=>cvData[listKey].find(i=>i.id===id)).filter(Boolean);
      markDirty();
    });
    card.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';if(card!==dragSrc)card.classList.add('drag-over');});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault();
      if(dragSrc&&dragSrc!==card){
        const all=Array.from(container.querySelectorAll('.card[data-id]'));
        if(all.indexOf(dragSrc)<all.indexOf(card)) container.insertBefore(dragSrc,card.nextSibling);
        else container.insertBefore(dragSrc,card);
      }
      card.classList.remove('drag-over');
    });
  });
}

// ====== HILFSFUNKTIONEN FUER DIE VORSCHAU ======
function fullUrl(url) {
  if(!url) return '#';
  if(/^(https?:|mailto:)/.test(url)) return url;
  return 'https://'+url;
}

// Rendert ein Foto als CSS-Hintergrund-Div (zuverlaessiger fuer html2canvas als object-fit auf img)
function photoBox(w, h, extraCss) {
  const p = cvData.personal;
  if (!p.photo) return '';
  const br = p.photoShape === 'square' ? '4px' : '50%';
  const zoom = p.photoZoom || 1;
  const posY = (p.photoPosY != null) ? p.photoPosY : 50;
  // Live-Vorschau: bei bekanntem Seitenverhaeltnis die Cover-Groesse exakt in
  // Pixeln berechnen und mit dem Zoom multiplizieren (so wirkt der Foto-Zoom in
  // der Vorschau). Ohne bekanntes Verhaeltnis klassisches "cover".
  let sizeCss;
  if (p.photoAspect) {
    const a = p.photoAspect;       // natuerliches Verhaeltnis Breite/Hoehe
    let bgW, bgH;
    if (w / h > a) { bgW = w; bgH = w / a; } else { bgH = h; bgW = h * a; }
    sizeCss = `background-size:${Math.round(bgW * zoom)}px ${Math.round(bgH * zoom)}px;`;
  } else {
    sizeCss = `background-size:cover;`;
  }
  // border-radius (Form: rund/eckig) bewusst ZULETZT setzen, damit die vom Nutzer
  // gewaehlte Form immer Vorrang vor evtl. in extraCss gesetzten Werten der Vorlage
  // hat (sonst bleibt z. B. die Profil-Vorlage trotz Auswahl bei eckigen Ecken).
  // data-photo-overlay markiert die Foto-Box; beim PDF-Export wird ihr Hintergrund
  // durch eine scharf vorgerenderte Version ersetzt (schaerfeFotosFuerCapture).
  return `<div data-photo-overlay="1" style="width:${w}px;height:${h}px;background-image:url('${p.photo}');${sizeCss}background-position:center ${posY}%;background-repeat:no-repeat;flex-shrink:0;${extraCss||''}border-radius:${br};"></div>`;
}

// Hilfsfunktion fuer Kontakt-Links
function lnk(href, text) {
  return `<a href="${href}" class="cv-link">${text}</a>`;
}

// Portfolio-Hinweis: minimalistisches Globus-Icon + dezentes Label statt einer

function iconLink(url, svg, label) {

// Optionaler, dezenter Projekt-Link (oeffnet das jeweilige Projekt).
function projectLink(url) {

}

// Sterne-Bewertung (1-5) als gefuellte/leere Sterne. Gefuellte in Akzentblau,
// leere in Hellblau - wie in der Vorlage "Profil Klassisch".
function sterne(level) {
  const n = Math.max(0, Math.min(5, parseInt(level) || 0));
  let s = '';
  for (let i = 1; i <= 5; i++) s += `<span style="color:${i <= n ? '#1d4ed8' : '#bcd0f5'}">&#9733;</span>`;
  return `<span class="pf-stars">${s}</span>`;
}

function buildProfil() {
  const p = cvData.personal;
  const photo = p.photo ? photoBox(168, 200, 'border-radius:4px;display:block;margin:0 auto 16px;') : '';
  const dataItem = (label, val) => val ? `<div class="pf-data-item"><div class="pf-label">${label}</div><div class="pf-value">${val}</div></div>` : '';
  const persData = [
    dataItem(t('cv_lbl_address'), esc(p.address)),
    dataItem(t('ed_email'), p.email ? lnk('mailto:'+p.email, esc(p.email)) : ''),
    dataItem(t('ed_phone'), esc(p.phone)),
    dataItem(t('cv_lbl_birthdate'), esc(p.birthdate)),
    dataItem(t('cv_lbl_birthplace'), esc(p.birthplace)),
    dataItem(t('cv_lbl_nationality'), esc(p.nationality)),
    dataItem(t('cv_lbl_marital'), esc(p.marital))
  ].join('') + (() => {
    // LinkedIn, GitHub und Portfolio gemeinsam in EINER ausgerichteten Icon-Reihe
    // (statt untereinander) - sauber, modern und einheitlich.
    const social = [
      p.linkedin ? iconLink(p.linkedin, SVG_LINKEDIN, 'LinkedIn') : '',
      p.github ? iconLink(p.github, SVG_GITHUB, 'GitHub') : '',
      p.website ? portfolioLink(p.website) : ''
    ].filter(Boolean).join('');
    return social ? `<div class="pf-social">${social}</div>` : '';
  })();
  const knHtml = cvData.skills.map(c => `
    <div class="pf-section">
      <div class="pf-section-title">${esc(c.category)}</div>
      ${c.items.map(it => {
        const lvl = (c.ratings && c.ratings[it]) || 0;
        return `<div class="pf-skill-row"><span class="pf-skill-name">${esc(it)}</span>${lvl > 0 ? sterne(lvl) : ''}</div>`;
      }).join('')}
    </div>`).join('');
  const langHtml = cvData.languages.map(l => `<div class="pf-lang">${esc(l.name)} (${esc(l.level)})</div>`).join('');
  const intHtml = cvData.interests.map(i => esc(i.text)).filter(Boolean).join(' · ');
  const entry = (from, to, title, company, bullets, stack, desc) => `
    <div class="pf-entry">
      <div class="pf-date">${esc(from)}<br>- ${esc(to)}</div>
      <div class="pf-body">
        <div class="pf-title">${title}</div>
        ${company ? `<div class="pf-company">${company}</div>` : ''}
        ${desc ? `<div class="pf-desc">${desc}</div>` : ''}
        ${bullets && bullets.length ? `<ul class="cv-bullets">${bullets.filter(b=>b).map(b=>`<li>${fmt(b)}</li>`).join('')}</ul>` : ''}
        ${stack && stack.length ? `<div>${stack.map(s=>`<span class="tech-badge">${esc(s)}</span>`).join('')}</div>` : ''}
      </div>
    </div>`;
  const expHtml = cvData.experience.map(e => entry(e.from, e.to, esc(e.title), esc(e.company)+(e.location?', '+esc(e.location):''), e.bullets, null, '')).join('');
  const projHtml = cvData.projects.map(pr => entry(pr.from, pr.to, esc(pr.title)+(pr.link?projectLink(pr.link):''), esc(pr.type), pr.bullets, pr.stack, '')).join('');
  const eduHtml = cvData.education.map(ed => entry(ed.from, ed.to, esc(ed.degree), esc(ed.institution)+(ed.location?', '+esc(ed.location):''), null, null, ed.notes?esc(ed.notes):'')).join('');
  return `<div class="tpl-profil">
    <div class="pf-left">
      <div class="pf-name">${esc(p.name)}</div>
      ${photo}
      ${p.jobtitle ? `<div style="font-size:11px;color:var(--cv-ink);font-weight:600;margin-bottom:16px">${esc(p.jobtitle)}</div>` : ''}
      <div class="pf-section"><div class="pf-section-title">${t('cv_personal_data')}</div>${persData}</div>
      ${knHtml}
      ${langHtml ? `<div class="pf-section"><div class="pf-section-title">${t('cv_languages')}</div>${langHtml}</div>` : ''}
      ${intHtml ? `<div class="pf-section"><div class="pf-section-title">${t('cv_interests')}</div><div class="kn-items">${intHtml}</div></div>` : ''}
    </div>
    <div class="pf-right">
      <div class="pf-section"><div class="pf-rsection-title">${t('cv_experience')}</div>${expHtml}</div>
      ${eduHtml ? `<div class="pf-section"><div class="pf-rsection-title">${t('cv_education')}</div>${eduHtml}</div>` : ''}
      ${projHtml ? `<div class="pf-section"><div class="pf-rsection-title">${t('cv_projects')}</div>${projHtml}</div>` : ''}
    </div>
  </div>`;
}

// ====== VORSCHAU RENDERN ======
function renderPreview() {
  const tpl = cvData.template || 'minimal';
  const container = document.getElementById('cv-preview');
  const builders = {
    minimal: buildMinimal, sidebar: buildSidebar, dach: buildDach,
    header: buildHeader, compact: buildCompact, exec: buildExec,
    twocol: buildTwocol, lineleft: buildLineleft, card: buildCard, plain: buildPlain,
    profil: buildProfil, modern: buildModern
  };
  container.innerHTML = (builders[tpl] || buildMinimal)();
  const sel = document.getElementById('template-select');
  if (sel && sel.value !== tpl) sel.value = tpl;
  applyFont();
  applyTextColor();
  // Seitenlayout (volle A4-Seiten) und Seitengrenzen aktualisieren
  applyPageLayout();
}

const A4_PAGE_PX = 1123; // A4-Seitenhoehe bei 96 DPI (794 x 1123)

// Aktuelle Seitenzahl und exakte Gesamthoehe der Vorschau (vom Layout berechnet).
// Der PDF-Export verwendet genau diese Werte, damit Vorschau und PDF identisch
// sind und keine zusaetzliche leere Seite entsteht.
let cvSeitenAnzahl = 1;
let cvGesamthoehePx = A4_PAGE_PX;

// Ermittelt die unterste Kante des TATSAECHLICHEN Inhalts (ohne abschliessendes
// Padding des Templates). So fuehrt ein reiner Padding-Rest nicht faelschlich zu
// einer zusaetzlichen, komplett leeren Seite.
function inhaltsUnterkante(el) {
  const basis = el.getBoundingClientRect();
  let unten = 0;
  el.querySelectorAll('*').forEach(node => {
    // Nur Blattelemente (echtes Inhalts-Ende) zaehlen - Container mit Padding
    // wuerden ihr Padding mitzaehlen und faelschlich eine leere Seite erzeugen.
    if (node.children.length > 0) return;
    if (node.classList && node.classList.contains('pbc')) return;
    const r = node.getBoundingClientRect();
    if (r.height === 0 && r.width === 0) return; // unsichtbare Elemente ignorieren
    const b = r.bottom - basis.top;
    if (b > unten) unten = b;
  });
  return unten;
}

// Sorgt dafuer, dass die Vorschau-Seite immer eine ganze Zahl voller A4-Seiten
// hoch ist. Dadurch ist JEDE Seite vollstaendig weiss - exakt wie das PDF.
function applyPageLayout() {
  const el = document.getElementById('cv-preview');
  const child = el.firstElementChild;
  // Fruehere Markierungen, erzwungene Hoehen, Begrenzung und Abstaende entfernen,
  // um die echte Inhaltshoehe sauber messen zu koennen
  el.querySelectorAll('.pbc').forEach(x => x.remove());
  el.style.minHeight = '';
  el.style.height = '';
  el.style.overflow = '';
  if (child) child.style.minHeight = '';
  // Skalierung fuer die Messung entfernen: getBoundingClientRect liefert sonst
  // skalierte Koordinaten und die Seitenumbruch-Berechnung (gegen A4_PAGE_PX in
  // echten Pixeln) waere falsch. Nach der Messung wird wieder skaliert.
  el.style.transform = 'none';
  // Seitenumbrueche vermeiden: einzelne Zeilen, die eine A4-Grenze kreuzen, auf
  // die naechste Seite schieben - kein abgeschnittener Text
  vermeideSeitenumbrueche(el);
  // Seitenzahl aus der tatsaechlichen Inhalts-Unterkante (ohne Padding) berechnen.
  // Toleranz von 0,01 Seite verhindert eine leere Seite durch winzige Ueberhaenge.
  const unten = inhaltsUnterkante(el);
  cvSeitenAnzahl = Math.max(1, Math.ceil(unten / A4_PAGE_PX - 0.01));
  cvGesamthoehePx = cvSeitenAnzahl * A4_PAGE_PX;
  // Vorschau exakt auf volle Seitenanzahl fixieren; der Padding-Rest unterhalb
  // wird abgeschnitten (es ist nur Leerraum, kein Inhalt) -> keine leere Seite.
  el.style.height = cvGesamthoehePx + 'px';
  el.style.overflow = 'hidden';
  if (child) child.style.minHeight = cvGesamthoehePx + 'px';
  addSeitentrennlinien(cvSeitenAnzahl);
  // Vorschau auf die verfuegbare Breite skalieren (Desktop = 1, Mobil < 1)
  applyPreviewScale();
}

// Skaliert die A4-Vorschau so, dass sie immer vollstaendig in die verfuegbare
// Breite passt - auf JEDER Bildschirmgroesse, ohne horizontales Scrollen.
// Wichtig: Es wird nur fuer die ANZEIGE skaliert. cv-preview behaelt seine echte
// Breite (794px); der Wrapper preview-fit traegt die skalierte Layout-Groesse,
// damit die Zentrierung stimmt und kein Leerraum/Ueberlauf entsteht.
// Der PDF-Export setzt die Skalierung vorher zurueck (echte 794px Aufloesung).
function applyPreviewScale() {
  const el = document.getElementById('cv-preview');
  const fit = document.getElementById('preview-fit');
  const scroller = document.getElementById('preview-scroller');
  if (!el || !fit || !scroller) return;
  const cs = getComputedStyle(scroller);
  const padX = parseFloat(cs.paddingLeft || 0) + parseFloat(cs.paddingRight || 0);
  const avail = scroller.clientWidth - padX;
  const A4_W = 794;
  const scale = Math.min(1, avail / A4_W);
  const realH = cvGesamthoehePx || A4_PAGE_PX;
  if (scale >= 1) {
    // Desktop / breit genug: keine Skalierung, Wrapper neutral
    el.style.transform = 'none';
    fit.style.width = '';
    fit.style.height = '';
  } else {
    el.style.transform = `scale(${scale})`;
    // Layout-Box auf die sichtbare (skalierte) Groesse zusammenfalten
    fit.style.width = (A4_W * scale) + 'px';
    fit.style.height = (realH * scale) + 'px';
  }
}

// Wechselt auf kleinen Bildschirmen zwischen Bearbeiten und Vorschau.
function setMobileView(view) {
  document.body.classList.toggle('mob-edit', view === 'edit');
  document.body.classList.toggle('mob-preview', view === 'preview');
  document.querySelectorAll('#mobile-switch .mob-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.view === view));
  // Beim Wechsel zur Vorschau neu skalieren (Scroller-Breite ist jetzt bekannt)
  if (view === 'preview') applyPreviewScale();
}

// Verschiebt nur die EINZELNE Zeile (Stichpunkt, Titelzeile, Abschnittstitel),
// die genau auf einer A4-Grenze liegt, auf den Anfang der naechsten Seite.
// Dadurch wird keine Textzeile mittendrin abgeschnitten - und es entsteht
// nur minimaler Leerraum (hoechstens etwa eine Zeile), kein verschwendeter Platz.
// Wird top-down angewendet; jede Zeile wird mit frischer Geometrie gemessen.
const ZEILEN_SELEKTOR = [
  '.cv-section-title', '.col-section-title', '.left-section-title',
  '.cv-entry-header', '.cv-entry-sub',
  '.cv-bullets li',
  '.cv-tl-entry', '.cv-tl-title', '.cv-tl-sub',
  '.skill-cat', '.skill-row', '.lang-item', '.pers-item', '.contact-item',
  '.left-skill-cat', '.kn-row',
  '.pf-title', '.pf-company', '.pf-rsection-title', '.pf-section-title', '.pf-data-item', '.pf-lang', '.pf-skill-row',
  '.mod-sec-title', '.mod-entry-head', '.mod-entry-sub', '.mod-proj-title', '.mod-proj-stack', '.mod-skill', '.mod-lang', '.mod-int'
].join(', ');

// Gilt fuer ALLE Vorlagen (auch mehrspaltige): jede Spalte ist ein eigener Fluss,
// das Verschieben einer Zeile betrifft nur ihre eigene Spalte. So wird in keiner
// Spalte eine Textzeile an einer Seitengrenze abgeschnitten.
//
// Wichtig: Es wird padding-top statt margin-top verwendet. Margin-top wuerde mit
// der margin-bottom des vorherigen Geschwisterelements kollabieren (z. B. 15 px)
// und die Zeile dadurch zu wenig verschieben -> der Text wuerde trotzdem
// abgeschnitten. Padding kollabiert nie und verschiebt exakt um den noetigen Wert.
// Die Funktion ist idempotent (setzt zuvor gesetzte Abstaende zuerst zurueck).
function vermeideSeitenumbrueche(el) {
  const PAGE = A4_PAGE_PX;
  const zeilen = Array.from(el.querySelectorAll(ZEILEN_SELEKTOR));
  zeilen.forEach(z => { z.style.paddingTop = ''; });
  zeilen.forEach(zeile => {
    const basis = el.getBoundingClientRect();
    const r = zeile.getBoundingClientRect();
    const top = r.top - basis.top;
    const bottom = r.bottom - basis.top;
    const hoehe = r.height;
    if (hoehe <= 0 || hoehe >= PAGE) return; // passt nie auf eine Seite
    const seiteOben = Math.floor(top / PAGE);
    const seiteUnten = Math.floor((bottom - 1) / PAGE);
    if (seiteOben !== seiteUnten) {
      const naechsteGrenze = (seiteOben + 1) * PAGE;
      const schub = naechsteGrenze - top + 2; // minimaler Puffer
      zeile.style.paddingTop = schub + 'px';
    }
  });
}

// Zeigt dezente Seitengrenzen-Markierungen an den A4-Grenzen in der Vorschau an.
// Optik wie ein Dokumenteneditor (Word/Google Docs): ein zarter Seitenrand mit
// Schatten, der das Ende einer Seite andeutet - kein alarmierender roter Strich.
// Diese Elemente (.pbc) werden beim PDF-Export temporaer ausgeblendet.
function addSeitentrennlinien(seitenzahl) {
  const el = document.getElementById('cv-preview');
  const seitenhoehe = A4_PAGE_PX;
  for (let seite = 1; seite < seitenzahl; seite++) {
    const y = seite * seitenhoehe;
    // Untere Kante der vorherigen Seite (zarte Linie mit weichem Schatten nach oben)
    const linie = document.createElement('div');
    linie.className = 'pbc';
    linie.style.cssText = `position:absolute;left:0;right:0;top:${y}px;height:0;`
      + `border-top:1px solid rgba(148,163,184,.55);`
      + `box-shadow:0 -6px 10px -6px rgba(15,23,42,.18);`
      + `pointer-events:none;z-index:10;`;
    // Dezentes Seitenlabel, zentriert auf der Trennlinie
    const badge = document.createElement('span');
    badge.className = 'pbc';
    badge.style.cssText = `position:absolute;left:50%;transform:translateX(-50%);top:${y - 10}px;`
      + `background:#64748b;color:#fff;font-size:8.5px;font-weight:600;`
      + `font-family:system-ui,sans-serif;letter-spacing:.3px;padding:2px 10px;`
      + `border-radius:10px;opacity:.85;pointer-events:none;z-index:11;`;
    badge.textContent = `Seite ${seite + 1}`;
    el.appendChild(linie);
    el.appendChild(badge);
  }
}

// Export: aktiver Lebenslauf inkl. Name (Wrapper-Format der Geschaeftslogik).
function exportJSON() {

// Import: legt einen NEUEN Lebenslauf an (nicht-destruktiv) und wechselt dorthin.
function onJSONFileSelected(e) {

// Pruegt, ob eine Canvas-Zeile (fast) leer/weiss ist - toleriert duenne Linien
// (z. B. die vertikale Trennlinie der Profil-Vorlage).
function istFastLeereZeile(buf, breite, zeile) {
  let nichtWeiss = 0;
  const grenze = Math.max(2, Math.floor(breite * 0.012));
  const basis = zeile * breite * 4;
  for (let i = 0; i < breite; i++) {
    const p = basis + i * 4;
    if (buf[p] < 245 || buf[p + 1] < 245 || buf[p + 2] < 245) {
      nichtWeiss++;
      if (nichtWeiss > grenze) return false;
    }
  }
  return true;
}

// Liefert die Y-Schnittpunkte (Canvas-Pixel) fuer die Seiten. Nahe jeder A4-Grenze
// wird die zur Grenze NAECHSTGELEGENE (fast) leere Zeile gesucht (oberhalb wie
// unterhalb), damit kein Text getrennt wird und sich der Schnitt nicht aufsummiert
// (das wuerde sonst eine fast leere Zusatzseite erzeugen).
function berechneSchnittpunkte(canvas, PAGE_H_PX, skala) {
  const ctx = canvas.getContext('2d');
  const breite = canvas.width;
  const lookback = Math.round(80 * skala);    // Suchbereich oberhalb der Grenze
  const lookforward = Math.round(14 * skala); // kleiner Bereich unterhalb der Grenze
  const cuts = [0];
  let cur = 0;
  while (cur + PAGE_H_PX < canvas.height - 1) {
    const target = cur + PAGE_H_PX;
    const von = Math.max(cur + Math.floor(PAGE_H_PX * 0.5), target - lookback);
    const bis = Math.min(canvas.height, target + lookforward);
    let schnitt = target, bestDist = Infinity;
    try {
      const region = ctx.getImageData(0, von, breite, bis - von).data;
      for (let y = 0; y < bis - von; y++) {
        if (istFastLeereZeile(region, breite, y)) {
          const yc = von + y;
          const d = Math.abs(yc - target);
          if (d < bestDist) { bestDist = d; schnitt = yc; }
        }
      }
    } catch (e) { schnitt = target; }
    if (schnitt <= cur) schnitt = target; // Fortschritt sicherstellen
    cuts.push(schnitt);
    cur = schnitt;
  }
  // Winzigen Rest vermeiden: faellt am Ende nur ein kleiner Streifen an, wird er
  // in die letzte Seite gezogen statt eine fast leere Zusatzseite zu erzeugen.
  const rest = canvas.height - cur;
  if (cuts.length >= 2 && rest <= 0.10 * PAGE_H_PX) {
    cuts[cuts.length - 1] = canvas.height;
  } else {
    cuts.push(canvas.height);
  }
  return cuts;
}

// ====== KLICKBARE LINKS IM PDF ======
// Ordnet jeden Link der richtigen Seite zu - auf Basis der tatsaechlichen
// Schnittpunkte (Seiten koennen leicht unterschiedlich hoch sein).
function addClickableLinks(pdf, previewEl, cuts, skala, pxPerMM) {
  const mmPerPxLive = 210 / previewEl.offsetWidth;
  const containerRect = previewEl.getBoundingClientRect();
  const seiten = pdf.internal.getNumberOfPages();

  previewEl.querySelectorAll('a[href]').forEach(link => {
    const href = link.getAttribute('href');
    if (!href || href === '#') return;
    const r = link.getBoundingClientRect();
    const relTop = r.top - containerRect.top;
    const relLeft = r.left - containerRect.left;
    const yCanvas = relTop * skala;
    // Seite anhand der Schnittpunkte bestimmen
    let seite = 0;
    for (let i = 0; i < cuts.length - 1; i++) {
      if (yCanvas >= cuts[i] && yCanvas < cuts[i + 1]) { seite = i; break; }
      if (i === cuts.length - 2) seite = i;
    }
    const x = relLeft * mmPerPxLive;
    const y = (yCanvas - cuts[seite]) / pxPerMM;
    const w = Math.max(r.width * mmPerPxLive, 10);
    const h = Math.max(r.height * mmPerPxLive, 4);
    if (seite >= 0 && seite < seiten) {
      pdf.setPage(seite + 1);
      pdf.link(x, y, w, h, { url: href });
    }
  });

  if (seiten > 0) pdf.setPage(seiten);
}

// Legt eine UNSICHTBARE, aber markier- und kopierbare Textebene ueber das Bild.
// Das PDF zeigt weiterhin das pixelgenaue html2canvas-Bild; zusaetzlich wird der
// echte Text (in Lesereihenfolge, an der passenden Position) als unsichtbarer Text
// hinterlegt - wie bei einem durchsuchbaren Scan-PDF. So bleibt das Design exakt,
// und der Text laesst sich markieren, kopieren und durchsuchen.
function addTextLayer(pdf, previewEl, cuts, skala, pxPerMM) {
  const mmPerPxLive = 210 / previewEl.offsetWidth;
  const containerRect = previewEl.getBoundingClientRect();
  const seitenAnzahl = pdf.internal.getNumberOfPages();
  pdf.setFont('helvetica', 'normal');
  const walker = document.createTreeWalker(previewEl, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      if (!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
      const pe = node.parentElement;
      if (!pe || pe.classList.contains('pbc')) return NodeFilter.FILTER_REJECT;
      const cs = getComputedStyle(pe);
      if (cs.visibility === 'hidden' || cs.display === 'none' || parseFloat(cs.opacity) === 0) return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const range = document.createRange();
  let node;
  while ((node = walker.nextNode())) {
    const pe = node.parentElement;
    const cs = getComputedStyle(pe);
    const fontPx = parseFloat(cs.fontSize) || 11;
    const fontPt = fontPx * mmPerPxLive * 72 / 25.4;
    range.selectNodeContents(node);
    const rects = range.getClientRects();
    if (!rects.length) continue;
    const r = rects[0];
    if (r.width <= 0 || r.height <= 0) continue;
    const text = node.nodeValue.replace(/\s+/g, ' ').trim();
    if (!text) continue;
    const relTop = r.top - containerRect.top;
    const relLeft = r.left - containerRect.left;
    const baselineCss = relTop + fontPx * 0.8;     // Grundlinie ~ 0.8em unter der Oberkante
    const yCanvas = baselineCss * skala;
    let seite = 0;
    for (let i = 0; i < cuts.length - 1; i++) {
      if (yCanvas >= cuts[i] && yCanvas < cuts[i + 1]) { seite = i; break; }
      if (i === cuts.length - 2) seite = i;
    }
    if (seite < 0 || seite >= seitenAnzahl) continue;
    const x = relLeft * mmPerPxLive;
    const y = (yCanvas - cuts[seite]) / pxPerMM;
    const maxWidth = Math.max(20, 210 - x - 3);
    pdf.setPage(seite + 1);
    pdf.setFontSize(fontPt);
    try { pdf.text(text, x, y, { renderingMode: 'invisible', maxWidth, lineHeightFactor: 1.15 }); }
    catch (e) { try { pdf.text(text, x, y, { renderingMode: 'invisible' }); } catch (e2) {} }
  }
  if (seitenAnzahl > 0) pdf.setPage(seitenAnzahl);
}

// ====== PDF-EXPORT ======
// Ersetzt vor dem html2canvas-Capture den Foto-Hintergrund durch eine exakt auf die
// Export-Aufloesung vorgerenderte, SCHARFE Version - und stellt ihn danach wieder her.
//
// Warum so: Die GROESSE und Position des Fotos uebernimmt das normale html2canvas-
// Layout (die Foto-Box ist z. B. 168x200 - genau wie alles andere). Es wird KEINE
// Geometrie berechnet; dadurch kann das Foto nie falsch (zu gross) dimensioniert
// werden. Die QUALITAET kommt aus dem Vorrendern: Das Originalfoto wird vom Browser
// mit hoher Glaettung exakt auf (Box-Groesse * Export-Skala) gerechnet, sodass
// html2canvas praktisch 1:1 zeichnet -> gestochen scharf, kein Qualitaetsverlust.
//
// Wichtig: background-size wird EXPLIZIT auf die Box-Groesse gesetzt (nicht "cover").
// "cover" rendert html2canvas zusammen mit border-radius unzuverlaessig (Ueberlauf/
// Duplikat). Mit exakter Box-Groesse fuellt das (bereits zugeschnittene) Bild die Box
// genau aus - kein Ueberlauf, kein Duplikat. Zuschnitt (cover + Zoom + Position)
// passiert beim Vorrendern, deckungsgleich zur Live-Vorschau.
async function schaerfeFotosFuerCapture(el, skala) {
  const p = cvData.personal;
  if (!p.photo) return [];
  const boxes = Array.from(el.querySelectorAll('[data-photo-overlay]'));
  if (!boxes.length) return [];
  const img = await new Promise((ok, ko) => {
    const i = new Image();
    i.onload = () => ok(i);
    i.onerror = ko;
    i.src = p.photo;
  });
  const iw = img.naturalWidth, ih = img.naturalHeight;
  if (!iw || !ih) return [];
  const zoom = p.photoZoom || 1;
  const posY = p.photoPosY != null ? p.photoPosY : 50;
  const restores = [];
  boxes.forEach(box => {
    const bw = box.offsetWidth, bh = box.offsetHeight;
    if (!bw || !bh) return;
    // Zielaufloesung des Vorrenderns = Anzeigegroesse * Export-Skala
    const tw = Math.max(1, Math.round(bw * skala));
    const th = Math.max(1, Math.round(bh * skala));
    // cover-Zuschnitt des Originals (inkl. Zoom und vertikaler Position)
    const boxRatio = bw / bh, imgRatio = iw / ih;
    let sw, sh;
    if (imgRatio > boxRatio) { sh = ih / zoom; sw = sh * boxRatio; }
    else { sw = iw / zoom; sh = sw / boxRatio; }
    let sx = (iw - sw) / 2;
    let sy = (ih - sh) * (posY / 100);
    sx = Math.max(0, Math.min(sx, iw - sw));
    sy = Math.max(0, Math.min(sy, ih - sh));
    const cv = document.createElement('canvas');
    cv.width = tw; cv.height = th;
    const ctx = cv.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, tw, th);
    const sharp = cv.toDataURL('image/jpeg', 0.95);
    const prevBg = box.style.backgroundImage;
    const prevSize = box.style.backgroundSize;
    const prevPos = box.style.backgroundPosition;
    box.style.backgroundImage = `url('${sharp}')`;
    box.style.backgroundSize = `${bw}px ${bh}px`;
    box.style.backgroundPosition = '0 0';
    restores.push(() => {
      box.style.backgroundImage = prevBg;
      box.style.backgroundSize = prevSize;
      box.style.backgroundPosition = prevPos;
    });
  });
  return restores;
}

async function exportPDF() {
  const btn = document.getElementById('pdf-btn');
  const origText = btn.textContent;
  btn.textContent = t('pdf_wait'); btn.disabled = true;

  const el = document.getElementById('cv-preview');
  // Eventuelle Anzeige-Skalierung (Mobil) zuruecksetzen: der Export rendert immer
  // in echter A4-Aufloesung (794px). Wird im finally wiederhergestellt.
  const prevTransform = el.style.transform;
  el.style.transform = 'none';
  // Seitentrennlinien beim Capture ausblenden
  el.querySelectorAll('.pbc').forEach(x => x.style.display = 'none');

  // html2canvas loest currentColor in Inline-SVGs nicht auf -> Icons koennten
  // schwarz/unsichtbar werden (v. a. auf dunklen Vorlagen). Daher die echte
  // Textfarbe vor dem Capture fest in die SVGs schreiben und danach zuruecksetzen.
  const iconSvgs = el.querySelectorAll('.cv-icon svg');
  iconSvgs.forEach(svg => {
    const col = getComputedStyle(svg.parentElement).color;
    svg.dataset.prevFill = svg.style.fill || '';
    svg.style.fill = col;
  });

  // Foto-Hintergruende werden fuer den Capture durch eine scharf vorgerenderte
  // Version ersetzt (siehe schaerfeFotosFuerCapture) und im finally wiederhergestellt.
  let fotoRestores = [];

  try {
    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 300));

    // Breite immer exakt 794px (A4 bei 96 DPI), nie el.scrollWidth verwenden
    // windowWidth auf normalen Viewport setzen - verhindert Verzerrungen durch flex/grid
    // Exakt die vom Layout berechnete Gesamthoehe verwenden (volle Seiten),
    // nie el.scrollHeight - so entsteht keine zusaetzliche leere Seite.
    const captureHoehe = cvGesamthoehePx;
    // Hohe Aufloesung fuer scharfe Schrift UND scharfe Fotos. Der Faktor wird so
    // begrenzt, dass die maximale Canvas-Groesse (ca. 16384 px) nicht ueberschritten
    // wird - dadurch bleibt die Bildqualitaet auch bei langen Lebenslaeufen erhalten.
    const MAX_CANVAS = 16000;
    const skala = Math.max(2, Math.min(3, MAX_CANVAS / captureHoehe));
    // Foto scharf vorrendern (Groesse uebernimmt das normale html2canvas-Layout)
    fotoRestores = await schaerfeFotosFuerCapture(el, skala);
    const canvas = await html2canvas(el, {
      scale: skala,
      useCORS: true,
      allowTaint: true,
      logging: false,
      imageTimeout: 0,
      backgroundColor: '#ffffff',
      width: 794,
      height: captureHoehe,
      windowWidth: 1200,
      windowHeight: Math.max(captureHoehe, 900),
      x: 0, y: 0, scrollX: 0, scrollY: 0
    });

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    const PAGE_W_MM = 210;
    const PAGE_H_MM = 297;
    const PAGE_W_PX = canvas.width;
    const PAGE_H_PX = Math.round(PAGE_W_PX * PAGE_H_MM / PAGE_W_MM);
    const pxPerMM = PAGE_W_PX / PAGE_W_MM;

    // Schnittpunkte bestimmen: nahe jeder A4-Grenze die naechste (fast) leere
    // Zeile suchen und dort schneiden. So wird selbst bei kleinen html2canvas-
    // Abweichungen nie eine Textzeile durchschnitten (die Vorschau kann leicht
    // anders umbrechen als der Canvas).
    const cuts = berechneSchnittpunkte(canvas, PAGE_H_PX, skala);

    for (let i = 0; i < cuts.length - 1; i++) {
      if (i > 0) pdf.addPage();
      const startPX = cuts[i];
      const sliceH = cuts[i + 1] - cuts[i];
      const sliceHeightMM = sliceH / pxPerMM;

      const slice = document.createElement('canvas');
      slice.width = PAGE_W_PX;
      slice.height = sliceH;
      const ctx = slice.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, slice.width, slice.height);
      ctx.drawImage(canvas, 0, startPX, PAGE_W_PX, sliceH, 0, 0, PAGE_W_PX, sliceH);

      // JPEG statt PNG: ein A4-Seitencanvas in hoher Aufloesung waere als PNG
      // (verlustfrei) riesig (zweistellige MB). JPEG mit hoher Qualitaet komprimiert
      // Foto/Flaechen massiv und sieht bei Text praktisch identisch aus -> die
      // PDF-Datei schrumpft von zig MB auf wenige hundert KB.
      pdf.addImage(slice.toDataURL('image/jpeg', 0.9), 'JPEG', 0, 0, PAGE_W_MM, sliceHeightMM, undefined, 'FAST');
    }

    // Unsichtbare, markier-/kopierbare Textebene ueber das Bild legen (durchsuchbares PDF)
    addTextLayer(pdf, el, cuts, skala, pxPerMM);
    // Klickbare Links als PDF-Annotationen hinzufuegen (an die Schnittpunkte angepasst)
    addClickableLinks(pdf, el, cuts, skala, pxPerMM);

    const name = (cvData.personal.name || t('file_cv')).replace(/\s+/g, '_');
    pdf.save(`${name}_${t('file_cv')}.pdf`);
  } catch(err) {
    alert(t('pdf_error') + err.message);
  } finally {
    // Seitentrennlinien immer wiederherstellen, auch im Fehlerfall
    el.querySelectorAll('.pbc').forEach(x => x.style.display = '');
    // SVG-Icon-Farben zuruecksetzen (currentColor wieder aktiv fuer den Bildschirm)
    iconSvgs.forEach(svg => { svg.style.fill = svg.dataset.prevFill || ''; });
    // Foto-Hintergruende wiederherstellen (Live-Vorschau bleibt unveraendert)
    fotoRestores.forEach(fn => fn());
    // Anzeige-Skalierung wiederherstellen (Mobil)
    el.style.transform = prevTransform;
    applyPreviewScale();
  }

  btn.textContent = origText; btn.disabled = false;
}

// ====== HILFSWERKZEUGE ======
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(str) { return (str||'').replace(/'/g,"\\'"); }
// Wie esc(), wandelt zusaetzlich **Text** in <strong>Text</strong> um. Damit lassen
// sich technische Begriffe in Stichpunkten gezielt fett hervorheben. Sicher: erst
// wird vollstaendig escaped (kein HTML aus den Daten), dann nur die eigene
// **...**-Syntax in <strong> ueberfuehrt.
function fmt(str) {
  return esc(str).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
}
function uid() { return Math.random().toString(36).substr(2,8); }

// ====== INITIALISIERUNG ======
window.addEventListener('DOMContentLoaded', () => {
  // Sprache anwenden: Sprachauswahl synchronisieren, statische Beschriftungen setzen
  // und das <html lang>-Attribut aktualisieren (Browser-/gespeicherte Sprache).
  document.documentElement.lang = appLang;
  const langSel = document.getElementById('lang-select');
  if (langSel) langSel.value = appLang;
  applyStaticI18n();
  // Bibliothek aufbauen (vorhandene CVs / Migration / leerer CV) und aktiven CV laden
  initLibrary();
  const sel = document.getElementById('template-select');
  if (sel) sel.value = cvData.template || 'minimal';
  renderCvBar();
  renderEditor();
  renderPreview();
  applyFont();
  // Mobile-Ansicht initialisieren (Standard: Bearbeiten). Auf dem Desktop ohne
  // sichtbare Wirkung, da der Umschalter per Media Query ausgeblendet ist.
  setMobileView('edit');
  // Vorschau bei Groessenaenderung (Drehen/Resize) neu skalieren - entkoppelt,
  // um Layout-Thrashing zu vermeiden.
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => applyPreviewScale(), 120);
  });
  // Layout nach vollstaendigem Laden der Schriftarten neu berechnen: vorher
  // koennen abweichende Schriftmasse die Seitenumbruch-Berechnung verfaelschen.
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => { applyPageLayout(); });
  }
  // Zusaetzliche Sicherheits-Neuberechnung, falls Bilder/Reflows spaeter eintreffen
  setTimeout(() => { applyPageLayout(); }, 400);
});
</script>
