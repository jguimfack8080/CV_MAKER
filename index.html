<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV-Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@400;700&family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="cv-core.js"></script>
<script src="default-cv.js"></script>
<style>
/* ====== RESET ====== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --c-bg: #f7f8fa; --c-surface: #ffffff; --c-border: #e4e7ec;
  --c-muted: #8a93a2; --c-text: #1a1d23; --c-accent: #2563eb;
  --c-accent-lt: #eff4ff; --c-danger: #dc2626; --c-success: #16a34a;
  --radius: 8px; --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --transition: .15s ease; --sidebar-w: 340px;
}
html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: var(--c-bg); color: var(--c-text); font-size: 14px; line-height: 1.5; }

/* ====== LAYOUT ====== */
#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
#topbar {
  display: flex; align-items: center; gap: 10px; padding: 0 16px;
  height: 52px; background: var(--c-surface); border-bottom: 1px solid var(--c-border);
  flex-shrink: 0; z-index: 10; overflow-x: auto;
}
#topbar::-webkit-scrollbar { display: none; }
#topbar .logo { font-weight: 700; font-size: 15px; letter-spacing: -.5px; color: var(--c-accent); white-space: nowrap; margin-right: 4px; }
#topbar .sep { width: 1px; height: 22px; background: var(--c-border); flex-shrink: 0; }
#topbar .spacer { flex: 1; min-width: 8px; }
#topbar label { font-size: 11px; color: var(--c-muted); white-space: nowrap; }
#topbar select { padding: 5px 8px; border: 1px solid var(--c-border); border-radius: var(--radius); font-size: 12px; background: white; color: var(--c-text); }
#topbar #cv-select { max-width: 180px; font-weight: 600; }
#topbar button:disabled { opacity: .45; cursor: not-allowed; }
.workspace { display: flex; flex: 1; overflow: hidden; }
#editor-panel {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--c-surface); border-right: 1px solid var(--c-border);
  display: flex; flex-direction: column; overflow: hidden;
}
#editor-tabs { display: flex; border-bottom: 1px solid var(--c-border); flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
#editor-tabs::-webkit-scrollbar { display: none; }
.etab { padding: 10px 12px; font-size: 11px; font-weight: 500; color: var(--c-muted); border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; transition: var(--transition); }
.etab:hover { color: var(--c-text); }
.etab.active { color: var(--c-accent); border-bottom-color: var(--c-accent); }
#editor-body { flex: 1; overflow-y: auto; padding: 14px; }
#preview-panel { flex: 1; background: #d1d5db; display: flex; flex-direction: column; overflow: hidden; }
#preview-bar { padding: 6px 14px; background: #374151; flex-shrink: 0; }
#preview-bar span { color: #9ca3af; font-size: 11px; }
#preview-scroller { flex: 1; overflow: auto; padding: 20px; display: flex; justify-content: center; }
#cv-preview { background: white; width: 794px; min-height: 1123px; flex-shrink: 0; position: relative; font-family: 'Inter', system-ui, sans-serif; --cv-ink: #1a1a1a; color: var(--cv-ink); }

/* ====== BUTTONS ====== */
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 12px; font-weight: 500; transition: var(--transition); white-space: nowrap; }
.btn-primary { background: var(--c-accent); color: white; }
.btn-primary:hover { background: #1d4ed8; }
.btn-ghost { background: transparent; color: var(--c-text); border: 1px solid var(--c-border); }
.btn-ghost:hover { background: var(--c-bg); }
.btn-danger { background: #fef2f2; color: var(--c-danger); border: 1px solid #fecaca; }
.btn-danger:hover { background: #fee2e2; }
.btn-sm { padding: 3px 9px; font-size: 11px; }

/* ====== FORM FIELDS ====== */
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--c-muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .4px; }
.field input, .field textarea, .field select { width: 100%; padding: 7px 9px; border: 1px solid var(--c-border); border-radius: var(--radius); font-size: 12px; font-family: inherit; color: var(--c-text); background: white; transition: var(--transition); }
.field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--c-accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.field textarea { resize: vertical; min-height: 65px; }

/* ====== CARDS ====== */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--c-muted); }
.card { border: 1px solid var(--c-border); border-radius: var(--radius); padding: 10px; margin-bottom: 8px; background: white; cursor: grab; transition: box-shadow var(--transition); }
.card:hover { box-shadow: var(--shadow-sm); }
.card.dragging { opacity: .5; }
.card.drag-over { border-color: var(--c-accent); box-shadow: 0 0 0 2px rgba(37,99,235,.2); }
.card-header { display: flex; align-items: center; }
.card-title { font-size: 12px; font-weight: 600; }
.card-sub { font-size: 10px; color: var(--c-muted); margin-top: 2px; }
.card-actions { display: flex; gap: 4px; margin-left: auto; flex-shrink: 0; }
.card-body { margin-top: 10px; display: none; }
.card-body.open { display: block; }
.drag-handle { color: var(--c-muted); cursor: grab; padding: 2px 6px; font-size: 15px; user-select: none; }
.tag-input-wrap { display: flex; gap: 5px; }
.tags-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
.tag { display: inline-flex; align-items: center; gap: 3px; background: var(--c-accent-lt); color: var(--c-accent); border: 1px solid #bfdbfe; border-radius: 4px; padding: 2px 7px; font-size: 11px; }
.tag-rm { cursor: pointer; font-size: 13px; opacity: .6; }
.tag-rm:hover { opacity: 1; }
.skill-edit-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.skill-edit-name { flex: 1; font-size: 12px; color: var(--c-text); }
.skill-edit-rate { width: 92px; flex-shrink: 0; padding: 3px 5px; border: 1px solid var(--c-border); border-radius: var(--radius); font-size: 11px; background: white; }
.bullet-list { list-style: none; }
.bullet-item { display: flex; gap: 5px; margin-bottom: 5px; align-items: flex-start; }
.bullet-item textarea { flex: 1; }
.bullet-rm { color: var(--c-danger); cursor: pointer; font-size: 15px; padding: 5px 3px; flex-shrink: 0; }
.add-section-btn { width: 100%; padding: 9px; border: 1px dashed var(--c-border); border-radius: var(--radius); background: transparent; color: var(--c-muted); font-size: 12px; cursor: pointer; text-align: center; transition: var(--transition); }
.add-section-btn:hover { border-color: var(--c-accent); color: var(--c-accent); background: var(--c-accent-lt); }
.photo-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; object-position: center top; border: 2px solid var(--c-border); display: block; margin: 8px auto; }
.photo-placeholder { width: 80px; height: 80px; border-radius: 50%; background: var(--c-bg); border: 2px dashed var(--c-border); display: flex; align-items: center; justify-content: center; margin: 8px auto; color: var(--c-muted); font-size: 11px; text-align: center; cursor: pointer; }
.autosave-indicator { font-size: 11px; color: var(--c-success); white-space: nowrap; }
.autosave-indicator.saving { color: var(--c-muted); }
.hidden { display: none !important; }

/* ====== CV-LINKS (klickbar, visuell unauffaellig) ====== */
.cv-link { color: inherit; text-decoration: none; }

/* ====== PORTFOLIO-HERVORHEBUNG ======
   Gut sichtbare Pille, die sich ueber currentColor an jede Vorlage (heller oder
   dunkler Hintergrund) anpasst und so immer auffaellt - ohne die einheitliche
   visuelle Identitaet zu brechen. */
.cv-link.cv-portfolio {
  display: inline-block;
  font-weight: 700;
  letter-spacing: .3px;
  text-decoration: none;
  border: 1.4px solid currentColor;
  border-radius: 999px;
  padding: 0 9px;
  line-height: 1.55;
  white-space: nowrap;
}
.cv-link.cv-portfolio::before { content: "\2197\00a0"; font-weight: 700; }

/* ====== KOMPAKTE SOCIAL-ICONS (LinkedIn / GitHub) ======
   Spart Platz: zeigt das Icon statt der langen URL. Passt sich ueber
   currentColor an helle und dunkle Vorlagen an; im PDF anklickbar. */
.cv-link.cv-icon { display: inline-flex; align-items: center; vertical-align: middle; }
.cv-link.cv-icon svg { width: 1.3em; height: 1.3em; display: block; fill: currentColor; }

/* ====== PROJEKT-LINK (optional, je Projekt) ====== */
.cv-link.cv-proj-link {
  display: inline-block;
  font-weight: 600;
  font-size: .9em;
  text-decoration: none;
  border: 1px solid currentColor;
  border-radius: 4px;
  padding: 0 6px;
  margin-left: 6px;
  opacity: .9;
  white-space: nowrap;
}

/* ====== TEMPLATE: MINIMAL ====== */
.tpl-minimal { padding: 46px 52px; font-family: inherit; color: var(--cv-ink); font-size: 10.5px; line-height: 1.55; }
.tpl-minimal .cv-name { font-size: 26px; font-weight: 700; letter-spacing: -.5px; margin-bottom: 3px; }
.tpl-minimal .cv-jobtitle { font-size: 12px; color: var(--cv-ink); margin-bottom: 14px; }
.tpl-minimal .cv-contact-bar { display: flex; flex-wrap: wrap; gap: 5px 18px; border-top: 1px solid #e4e7ec; border-bottom: 1px solid #e4e7ec; padding: 9px 0; margin-bottom: 26px; font-size: 10px; color: var(--cv-ink); }
.tpl-minimal .cv-photo-wrap { float: right; margin: 0 0 10px 16px; }
.tpl-minimal .cv-section { margin-bottom: 20px; }
.tpl-minimal .cv-section-title { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #2563eb; margin-bottom: 9px; padding-bottom: 4px; border-bottom: 1px solid #bfdbfe; }
.tpl-minimal .cv-entry { margin-bottom: 13px; }
.tpl-minimal .cv-entry-header { display: flex; justify-content: space-between; align-items: baseline; }
.tpl-minimal .cv-entry-title { font-weight: 600; font-size: 11px; }

.tpl-minimal .cv-entry-sub { font-size: 10px; color: #2563eb; font-weight: 500; margin-bottom: 3px; }
.tpl-minimal .cv-bullets { padding-left: 13px; margin-top: 3px; }
.tpl-minimal .cv-bullets li { margin-bottom: 2px; font-size: 10px; }
.tpl-minimal .skill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }

.tpl-minimal .skill-tags { display: flex; flex-wrap: wrap; gap: 3px; }
.tpl-minimal .skill-tag { background: #f3f4f6; border-radius: 3px; padding: 2px 6px; font-size: 9px; color: var(--cv-ink); }
.tpl-minimal .lang-row { display: flex; flex-wrap: wrap; gap: 4px 14px; }
.tpl-minimal .lang-item { font-size: 10px; }
.tpl-minimal .lang-level { color: var(--cv-ink); }
.tpl-minimal .tech-stack { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
.tpl-minimal .tech-badge { background: #eff6ff; color: #1d4ed8; border-radius: 3px; padding: 2px 6px; font-size: 9px; font-weight: 500; }

/* ====== TEMPLATE: SIDEBAR ====== */

.tpl-sidebar .lang-item { font-size: 9.5px; color: #cbd5e1; margin-bottom: 3px; }
.tpl-sidebar .lang-level { color: #64748b; font-size: 8.5px; }
.tpl-sidebar .cv-section { margin-bottom: 18px; }
.tpl-sidebar .cv-section-title { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #2563eb; margin-bottom: 9px; padding-bottom: 3px; border-bottom: 2px solid #bfdbfe; }
.tpl-sidebar .cv-entry { margin-bottom: 12px; }
.tpl-sidebar .cv-entry-header { display: flex; justify-content: space-between; align-items: baseline; }
.tpl-sidebar .cv-entry-title { font-weight: 600; font-size: 11px; }

.tpl-sidebar .cv-bullets { padding-left: 13px; margin-top: 3px; }

.tpl-sidebar .tech-badge { display: inline-block; background: #eff6ff; color: #1d4ed8; border-radius: 3px; padding: 2px 6px; font-size: 9px; font-weight: 500; margin: 2px 2px 0 0; }

/* ====== TEMPLATE: KLASSISCH DACH ====== */
.tpl-dach { padding: 40px 48px; font-family: inherit; color: var(--cv-ink); font-size: 10.5px; line-height: 1.6; }
.tpl-dach .cv-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }

.tpl-dach .cv-bullets { padding-left: 13px; margin-top: 3px; }

.tpl-dach .tech-stack { font-size: 10px; color: var(--cv-ink); margin-top: 4px; font-style: italic; }

/* ====== TEMPLATE: KREATIV HEADER ====== */

/* ====== TEMPLATE: KOMPAKT ZEITACHSE ====== */

<div id="app">

</div>

<script>
// ====== SCHRIFTARTEN ======
const FONTS = {
  inter:      "'Inter', system-ui, sans-serif",
  roboto:     "'Roboto', sans-serif",
  opensans:   "'Open Sans', sans-serif",
  montserrat: "'Montserrat', sans-serif",
  lato:       "'Lato', sans-serif",
  arial:      "Arial, sans-serif",
  helvetica:  "'Helvetica Neue', Helvetica, Arial, sans-serif",
  calibri:    "Calibri, 'Carlito', sans-serif",
  georgia:    "Georgia, serif",
  times:      "'Times New Roman', Times, serif",
  garamond:   "'EB Garamond', Garamond, serif"
};

// ====== ZUSTAND (Mehrfach-Lebenslauf) ======
// Die Daten- und Geschaeftslogik liegt in cv-core.js (Store, Models, Library).
// Hier wird nur der UI-nahe Zustand gehalten: aktiver CV im Speicher + aktiver Reiter.
const library = CVCore.createLibrary();   // Geschaeftslogik ueber localStorage
let cvData = CVCore.Models.createEmptyCv(); // Daten des aktuell bearbeiteten CV
let currentCvId = null;                     // ID des aktiven Lebenslaufs
let currentTab = 'personal';
let saveTimer = null;

// Laedt die Bibliothek beim Start: vorhandene CVs, sonst Migration des alten
// Einzel-CV, sonst ein neuer leerer Lebenslauf. Setzt cvData/currentCvId.
function initLibrary() {
  // Bei komplett leerem Speicher wird der neutrale Demo-Lebenslauf geladen
  // (window.CV_DEMO aus default-cv.js). Vorhandene Daten bleiben unberuehrt.
  const seed = (typeof window !== 'undefined' && window.CV_DEMO) ? window.CV_DEMO : null;
  currentCvId = library.ensureAtLeastOne('Mein Lebenslauf', seed);
  const active = library.loadActive();
  currentCvId = active.id;
  cvData = active.data;
}

// Wechselt den aktiven Lebenslauf und laedt dessen Daten.
function switchToCv(id) {
  if (!library.exists(id)) return;
  library.setActive(id);
  currentCvId = id;
  cvData = library.load(id);
  currentTab = 'personal';
  renderCvBar();
  renderEditor();
  renderPreview();
  applyFont();
}

// Speichert den aktiven Lebenslauf (verzoegert) und aktualisiert die Vorschau.
function saveToStorage() {
  const ind = document.getElementById('save-indicator');
  if (ind) { ind.textContent = 'Speichert...'; ind.className = 'autosave-indicator saving'; }
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    if (currentCvId) library.save(currentCvId, cvData);
    if (ind) { ind.textContent = 'Gespeichert'; ind.className = 'autosave-indicator'; }
    renderCvBar(); // aktualisiert ggf. den angezeigten Namen/Datum
  }, 600);
}
function markDirty() { saveToStorage(); renderPreview(); }

// ====== CV-VERWALTUNG (UI-Aktionen ueber die Geschaeftslogik) ======
function createNewCv() {
  const name = (prompt('Name des neuen Lebenslaufs:', 'Lebenslauf ' + (library.count() + 1)) || '').trim();
  if (name === '') return; // Abbruch
  const id = library.create(name);
  switchToCv(id);
}
function duplicateCurrentCv() {
  if (!currentCvId) return;
  const id = library.duplicate(currentCvId);
  if (id) switchToCv(id);
}
function renameCurrentCv() {
  if (!currentCvId) return;
  const aktuell = library.getName(currentCvId) || '';
  const name = (prompt('Lebenslauf umbenennen:', aktuell) || '').trim();
  if (name === '' || name === aktuell) return;
  library.rename(currentCvId, name);
  renderCvBar();
}
function deleteCurrentCv() {
  if (!currentCvId) return;
  const name = library.getName(currentCvId) || 'diesen Lebenslauf';
  if (!confirm('Lebenslauf "' + name + '" wirklich loeschen? Dies kann nicht rueckgaengig gemacht werden.')) return;
  library.remove(currentCvId);
  // Nach dem Loeschen sicherstellen, dass mindestens ein CV existiert
  currentCvId = library.ensureAtLeastOne('Mein Lebenslauf');
  switchToCv(currentCvId);
}

// Aktualisiert die Lebenslauf-Auswahl in der oberen Leiste.
function renderCvBar() {
  const sel = document.getElementById('cv-select');
  if (!sel) return;
  const items = library.list();
  sel.innerHTML = items.map(function (it) {
    const sel2 = it.id === currentCvId ? ' selected' : '';
    return `<option value="${it.id}"${sel2}>${esc(it.name)}</option>`;
  }).join('');
  // Loeschen nur erlauben, wenn mehr als ein Lebenslauf existiert
  const delBtn = document.querySelector('[onclick="deleteCurrentCv()"]');
  if (delBtn) delBtn.disabled = items.length <= 1;
}

// ====== REITER ======
function showTab(tab) {
  currentTab = tab;
  const tabs = ['personal','skills','experience','education','projects','languages','interests'];
  document.querySelectorAll('.etab').forEach((el,i) => el.classList.toggle('active', tabs[i] === tab));
  renderEditor();
}

// ====== EDITOR ======
function renderEditor() {
  const body = document.getElementById('editor-body');
  switch(currentTab) {
    case 'personal':   body.innerHTML = renderPersonalEditor(); bindPersonal(); break;
    case 'skills':     body.innerHTML = renderSkillsEditor(); bindDragList('skills'); break;
    case 'experience': body.innerHTML = renderListEditor('experience','Berufserfahrung',renderExpCard); bindDragList('experience'); break;
    case 'education':  body.innerHTML = renderListEditor('education','Ausbildung',renderEduCard); bindDragList('education'); break;
    case 'projects':   body.innerHTML = renderListEditor('projects','Projekte',renderProjectCard); bindDragList('projects'); break;
    case 'languages':  body.innerHTML = renderLanguagesEditor(); bindDragList('languages'); break;
    case 'interests':  body.innerHTML = renderInterestsEditor(); bindDragList('interests'); break;
  }
}

// -- PERSOENLICH --
function renderPersonalEditor() {
  const p = cvData.personal;
  const photoHtml = p.photo
    ? `<img src="${p.photo}" class="photo-preview">`
    : `<div class="photo-placeholder" onclick="document.getElementById('photo-upload').click()">Foto hochladen</div>`;
  return `
    <div class="section-header"><span class="section-title">Persoenliche Daten</span></div>
    ${photoHtml}
    <div style="text-align:center;margin-bottom:10px;">
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('photo-upload').click()">Foto waehlen</button>
      ${p.photo ? `<button class="btn btn-ghost btn-sm" onclick="removePhoto()">Entfernen</button>` : ''}
    </div>
    <input type="file" id="photo-upload" accept="image/*" class="hidden" onchange="onPhotoUpload(event)">
    <div class="field"><label>Foto-Darstellung</label>
      <select id="p-photoshape">
        <option value="circle" ${p.photoShape==='circle'?'selected':''}>Rund</option>
        <option value="square" ${p.photoShape==='square'?'selected':''}>Eckig</option>
      </select>
    </div>
    ${p.photo ? `
    <div class="field"><label>Foto-Zoom (${Math.round((p.photoZoom||1)*100)} %)</label>
      <input type="range" min="100" max="250" step="1" value="${Math.round((p.photoZoom||1)*100)}" style="width:100%" oninput="setPhotoZoom(this.value)"></div>
    <div class="field"><label>Foto-Position vertikal (${p.photoPosY!=null?p.photoPosY:50} %)</label>
      <input type="range" min="0" max="100" step="1" value="${p.photoPosY!=null?p.photoPosY:50}" style="width:100%" oninput="setPhotoPosY(this.value)"></div>
    ` : ''}
    <div class="field"><label>Name</label><input type="text" id="p-name" value="${esc(p.name)}"></div>
    <div class="field"><label>Berufsbezeichnung / Profil</label><input type="text" id="p-jobtitle" value="${esc(p.jobtitle)}"></div>
    <div class="field"><label>Adresse</label><input type="text" id="p-address" value="${esc(p.address)}"></div>
    <div class="field"><label>E-Mail</label><input type="email" id="p-email" value="${esc(p.email)}"></div>
    <div class="field"><label>Telefon</label><input type="tel" id="p-phone" value="${esc(p.phone)}"></div>
    <div class="field"><label>LinkedIn</label><input type="text" id="p-linkedin" value="${esc(p.linkedin)}"></div>
    <div class="field"><label>GitHub</label><input type="text" id="p-github" value="${esc(p.github||'')}"></div>
    <div class="field"><label>Portfolio / Website</label><input type="text" id="p-website" value="${esc(p.website||'')}"></div>
    <div class="field"><label>Geburtsdatum</label><input type="text" id="p-birthdate" value="${esc(p.birthdate)}"></div>
    <div class="field"><label>Geburtsort</label><input type="text" id="p-birthplace" value="${esc(p.birthplace)}"></div>
    <div class="field"><label>Staatsbuergerschaft</label><input type="text" id="p-nationality" value="${esc(p.nationality)}"></div>
    <div class="field"><label>Familienstand</label><input type="text" id="p-marital" value="${esc(p.marital)}"></div>
  `;
}
function bindPersonal() {
  ['name','jobtitle','address','email','phone','linkedin','github','website','birthdate','birthplace','nationality','marital'].forEach(f => {
    const el = document.getElementById('p-' + f);
    if (el) el.addEventListener('input', e => { cvData.personal[f] = e.target.value; markDirty(); });
  });
  const ps = document.getElementById('p-photoshape');
  if (ps) ps.addEventListener('change', e => { cvData.personal.photoShape = e.target.value; markDirty(); });
}
function onPhotoUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    cvData.personal.photo = ev.target.result;
    // Zoom/Position auf Standard setzen und natuerliches Seitenverhaeltnis
    // bestimmen (fuer den Zoom), ohne die Originalqualitaet zu veraendern.
    cvData.personal.photoZoom = 1;
    cvData.personal.photoPosY = 50;
    const img = new Image();
    img.onload = () => {
      cvData.personal.photoAspect = img.naturalWidth / img.naturalHeight;
      markDirty(); renderEditor();
    };
    img.src = ev.target.result;
    markDirty(); renderEditor();
  };
  reader.readAsDataURL(file);
}
function removePhoto() { cvData.personal.photo = null; cvData.personal.photoAspect = null; markDirty(); renderEditor(); }
// Foto-Groesse (Zoom) und vertikale Position anpassen - die Originaldatei bleibt
// unveraendert, nur die Darstellung im Rahmen wird angepasst.
function setPhotoZoom(v) { cvData.personal.photoZoom = (parseInt(v) || 100) / 100; markDirty(); }
function setPhotoPosY(v) { cvData.personal.photoPosY = parseInt(v); if (isNaN(cvData.personal.photoPosY)) cvData.personal.photoPosY = 50; markDirty(); }

// -- KENNTNISSE --
function renderSkillsEditor() {
  return `
    <div class="section-header"><span class="section-title">Skill-Matrix</span></div>
    <div id="skills-list">
      ${cvData.skills.map((cat,i) => `
        <div class="card" data-list="skills" data-id="${cat.id}" draggable="true">
          <div class="card-header">
            <span class="drag-handle">&#8942;</span>
            <div style="flex:1;margin-left:6px;"><div class="card-title">${esc(cat.category)}</div><div class="card-sub">${cat.items.length} Skills</div></div>
            <div class="card-actions">
              <button class="btn btn-ghost btn-sm" onclick="toggleCard('sk-body-${i}')">Bearbeiten</button>
              <button class="btn btn-danger btn-sm" onclick="removeSkillCat('${cat.id}')">x</button>
            </div>
          </div>
          <div class="card-body" id="sk-body-${i}">
            <div class="field"><label>Kategorie</label><input type="text" value="${esc(cat.category)}" onchange="updateSkillCat('${cat.id}','category',this.value)"></div>
            <label style="font-size:11px;font-weight:600;color:var(--c-muted);margin-bottom:4px;display:block;">SKILLS (Bewertung optional, fuer Vorlage "Profil Klassisch")</label>
            <div>${cat.items.map(it=>{
              const lvl=(cat.ratings&&cat.ratings[it])||0;
              return `<div class="skill-edit-row">
                <span class="skill-edit-name">${esc(it)}</span>
                <select class="skill-edit-rate" onchange="setSkillRating('${cat.id}','${escAttr(it)}',this.value)">
                  ${[0,1,2,3,4,5].map(n=>`<option value="${n}" ${n===lvl?'selected':''}>${n===0?'ohne':n+' Sterne'}</option>`).join('')}
                </select>
                <span class="tag-rm" onclick="removeSkillTag('${cat.id}','${escAttr(it)}')">x</span>
              </div>`;
            }).join('')}</div>
            <div class="tag-input-wrap" style="margin-top:8px;">
              <input type="text" id="sk-inp-${cat.id}" placeholder="Skill hinzufuegen..." style="flex:1;padding:6px 9px;border:1px solid var(--c-border);border-radius:var(--radius);font-size:12px;" onkeydown="if(event.key==='Enter'){event.preventDefault();addSkillTag('${cat.id}')}">
              <button class="btn btn-primary btn-sm" onclick="addSkillTag('${cat.id}')">+</button>
            </div>
          </div>
        </div>`).join('')}
    </div>
    <button class="add-section-btn" onclick="addSkillCat()">+ Kategorie hinzufuegen</button>`;
}
function toggleCard(id) { const el=document.getElementById(id); if(el) el.classList.toggle('open'); }
function updateSkillCat(id,f,v) { const c=cvData.skills.find(x=>x.id===id); if(c){c[f]=v;markDirty();} }
function removeSkillCat(id) { cvData.skills=cvData.skills.filter(c=>c.id!==id); markDirty(); renderEditor(); }
function addSkillCat() { cvData.skills.push({id:uid(),category:'Neue Kategorie',items:[],ratings:{}}); markDirty(); renderEditor(); }
function addSkillTag(catId) {
  const inp=document.getElementById('sk-inp-'+catId); const v=inp.value.trim(); if(!v) return;
  const cat=cvData.skills.find(c=>c.id===catId);
  if(cat&&!cat.items.includes(v)){cat.items.push(v);markDirty();renderEditor();showTab('skills');}
  else inp.value='';
}
function removeSkillTag(catId,tag) { const c=cvData.skills.find(x=>x.id===catId); if(c){c.items=c.items.filter(i=>i!==tag); if(c.ratings) delete c.ratings[tag]; markDirty();renderEditor();} }
// Sternebewertung eines Skills setzen (0 = ohne). Wird nur in der Vorlage
// "Profil Klassisch" angezeigt; andere Vorlagen ignorieren die Bewertung.
function setSkillRating(catId,name,val) {
  const c=cvData.skills.find(x=>x.id===catId); if(!c) return;
  if(!c.ratings) c.ratings={};
  const n=parseInt(val)||0;
  if(n===0) delete c.ratings[name]; else c.ratings[name]=n;
  markDirty();
}

// -- LISTEN-EDITOREN --
function renderListEditor(listKey,title,cardFn) {
  const items=cvData[listKey];
  return `<div class="section-header"><span class="section-title">${title}</span></div>
    <div id="${listKey}-list">${items.map((it,i)=>cardFn(it,i)).join('')}</div>
    <button class="add-section-btn" onclick="addListItem('${listKey}')">+ Eintrag hinzufuegen</button>`;
}
function renderExpCard(item,i) {
  return `<div class="card" data-list="experience" data-id="${item.id}" draggable="true">
    <div class="card-header">
      <span class="drag-handle">&#8942;</span>
      <div style="flex:1;margin-left:6px;"><div class="card-title">${esc(item.title)||'Neue Stelle'}</div><div class="card-sub">${esc(item.company)} - ${esc(item.from)} bis ${esc(item.to)}</div></div>
      <div class="card-actions">
        <button class="btn btn-ghost btn-sm" onclick="toggleCard('ex-body-${i}')">Bearbeiten</button>
        <button class="btn btn-danger btn-sm" onclick="removeListItem('experience','${item.id}')">x</button>
      </div>
    </div>
    <div class="card-body" id="ex-body-${i}">
      <div class="field"><label>Position</label><input type="text" value="${esc(item.title)}" onchange="updateListItem('experience','${item.id}','title',this.value)"></div>
      <div class="field"><label>Unternehmen</label><input type="text" value="${esc(item.company)}" onchange="updateListItem('experience','${item.id}','company',this.value)"></div>
      <div class="field"><label>Ort</label><input type="text" value="${esc(item.location)}" onchange="updateListItem('experience','${item.id}','location',this.value)"></div>
      <div style="display:flex;gap:8px">
        <div class="field" style="flex:1"><label>Von</label><input type="text" value="${esc(item.from)}" onchange="updateListItem('experience','${item.id}','from',this.value)"></div>
        <div class="field" style="flex:1"><label>Bis</label><input type="text" value="${esc(item.to)}" onchange="updateListItem('experience','${item.id}','to',this.value)"></div>
      </div>
      <label style="font-size:11px;font-weight:600;color:var(--c-muted);display:block;margin-bottom:5px;">AUFGABEN</label>
      <ul class="bullet-list">${(item.bullets||[]).map((b,bi)=>`<li class="bullet-item"><textarea onchange="updateBullet('experience','${item.id}',${bi},this.value)">${esc(b)}</textarea><span class="bullet-rm" onclick="removeBullet('experience','${item.id}',${bi})">-</span></li>`).join('')}</ul>
      <button class="add-section-btn" style="margin-top:5px" onclick="addBullet('experience','${item.id}')">+ Punkt</button>
    </div>
  </div>`;
}
function renderEduCard(item,i) {
  return `<div class="card" data-list="education" data-id="${item.id}" draggable="true">
    <div class="card-header">
      <span class="drag-handle">&#8942;</span>
      <div style="flex:1;margin-left:6px;"><div class="card-title">${esc(item.degree)||'Neuer Eintrag'}</div><div class="card-sub">${esc(item.institution)}</div></div>
      <div class="card-actions">
        <button class="btn btn-ghost btn-sm" onclick="toggleCard('edu-body-${i}')">Bearbeiten</button>
        <button class="btn btn-danger btn-sm" onclick="removeListItem('education','${item.id}')">x</button>
      </div>
    </div>
    <div class="card-body" id="edu-body-${i}">
      <div class="field"><label>Abschluss</label><input type="text" value="${esc(item.degree)}" onchange="updateListItem('education','${item.id}','degree',this.value)"></div>
      <div class="field"><label>Institution</label><input type="text" value="${esc(item.institution)}" onchange="updateListItem('education','${item.id}','institution',this.value)"></div>
      <div class="field"><label>Ort</label><input type="text" value="${esc(item.location)}" onchange="updateListItem('education','${item.id}','location',this.value)"></div>
      <div style="display:flex;gap:8px">
        <div class="field" style="flex:1"><label>Von</label><input type="text" value="${esc(item.from)}" onchange="updateListItem('education','${item.id}','from',this.value)"></div>
        <div class="field" style="flex:1"><label>Bis</label><input type="text" value="${esc(item.to)}" onchange="updateListItem('education','${item.id}','to',this.value)"></div>
      </div>
      <div class="field"><label>Anmerkungen</label><input type="text" value="${esc(item.notes||'')}" onchange="updateListItem('education','${item.id}','notes',this.value)"></div>
    </div>
  </div>`;
}
function renderProjectCard(item,i) {
  const stack=item.stack||[]; const bullets=item.bullets||[];
  return `<div class="card" data-list="projects" data-id="${item.id}" draggable="true">
    <div class="card-header">
      <span class="drag-handle">&#8942;</span>
      <div style="flex:1;margin-left:6px;"><div class="card-title">${esc(item.title)||'Neues Projekt'}</div><div class="card-sub">${esc(item.type)}</div></div>
      <div class="card-actions">
        <button class="btn btn-ghost btn-sm" onclick="toggleCard('pr-body-${i}')">Bearbeiten</button>
        <button class="btn btn-danger btn-sm" onclick="removeListItem('projects','${item.id}')">x</button>
      </div>
    </div>
    <div class="card-body" id="pr-body-${i}">
      <div class="field"><label>Projekttitel</label><input type="text" value="${esc(item.title)}" onchange="updateListItem('projects','${item.id}','title',this.value)"></div>
      <div class="field"><label>Art / Kontext</label><input type="text" value="${esc(item.type)}" onchange="updateListItem('projects','${item.id}','type',this.value)"></div>
      <div class="field"><label>Projekt-Link (optional)</label><input type="text" value="${esc(item.link||'')}" placeholder="z. B. github.com/... oder demo.example.com" onchange="updateListItem('projects','${item.id}','link',this.value)"></div>
      <div style="display:flex;gap:8px">
        <div class="field" style="flex:1"><label>Von</label><input type="text" value="${esc(item.from)}" onchange="updateListItem('projects','${item.id}','from',this.value)"></div>
        <div class="field" style="flex:1"><label>Bis</label><input type="text" value="${esc(item.to)}" onchange="updateListItem('projects','${item.id}','to',this.value)"></div>
      </div>
      <label style="font-size:11px;font-weight:600;color:var(--c-muted);display:block;margin-bottom:4px;">TECH-STACK</label>
      <div class="tags-list">${stack.map(s=>`<span class="tag">${esc(s)}<span class="tag-rm" onclick="removeProjStack('${item.id}','${escAttr(s)}')">x</span></span>`).join('')}</div>
      <div class="tag-input-wrap" style="margin-top:6px">
        <input type="text" id="st-inp-${item.id}" placeholder="Technologie..." style="flex:1;padding:6px 9px;border:1px solid var(--c-border);border-radius:var(--radius);font-size:12px;" onkeydown="if(event.key==='Enter'){event.preventDefault();addProjStack('${item.id}')}">
        <button class="btn btn-primary btn-sm" onclick="addProjStack('${item.id}')">+</button>
      </div>
      <label style="font-size:11px;font-weight:600;color:var(--c-muted);display:block;margin:9px 0 5px;">ERGEBNISSE</label>
      <ul class="bullet-list">${bullets.map((b,bi)=>`<li class="bullet-item"><textarea onchange="updateBullet('projects','${item.id}',${bi},this.value)">${esc(b)}</textarea><span class="bullet-rm" onclick="removeBullet('projects','${item.id}',${bi})">-</span></li>`).join('')}</ul>
      <button class="add-section-btn" style="margin-top:5px" onclick="addBullet('projects','${item.id}')">+ Punkt</button>
    </div>
  </div>`;
}
function renderLanguagesEditor() {
  return `<div class="section-header"><span class="section-title">Sprachen</span></div>
    <div id="languages-list">
      ${cvData.languages.map(l=>`<div class="card" data-list="languages" data-id="${l.id}" draggable="true">
        <div class="card-header">
          <span class="drag-handle">&#8942;</span>
          <div style="flex:1;margin-left:6px;display:flex;gap:6px">
            <input type="text" value="${esc(l.name)}" placeholder="Sprache" style="flex:1;padding:6px;border:1px solid var(--c-border);border-radius:4px;font-size:12px" onchange="updateListItem('languages','${l.id}','name',this.value)">
            <input type="text" value="${esc(l.level)}" placeholder="Niveau" style="width:75px;padding:6px;border:1px solid var(--c-border);border-radius:4px;font-size:12px" onchange="updateListItem('languages','${l.id}','level',this.value)">
          </div>
          <button class="btn btn-danger btn-sm" style="margin-left:5px" onclick="removeListItem('languages','${l.id}')">x</button>
        </div>
      </div>`).join('')}
    </div>
    <button class="add-section-btn" onclick="addListItem('languages')">+ Sprache hinzufuegen</button>`;
}
function renderInterestsEditor() {

function addListItem(k) { const d=JSON.parse(JSON.stringify(LIST_DEF[k]||{})); d.id=uid(); cvData[k].push(d); markDirty(); renderEditor(); }
function removeListItem(k,id) { cvData[k]=cvData[k].filter(i=>i.id!==id); markDirty(); renderEditor(); }
function updateListItem(k,id,f,v) { const it=cvData[k].find(i=>i.id===id); if(it){it[f]=v;markDirty();} }
function updateBullet(k,id,idx,v) { const it=cvData[k].find(i=>i.id===id); if(it&&it.bullets) it.bullets[idx]=v; markDirty(); }
function removeBullet(k,id,idx) { const it=cvData[k].find(i=>i.id===id); if(it&&it.bullets){it.bullets.splice(idx,1);markDirty();renderEditor();} }
function addBullet(k,id) { const it=cvData[k].find(i=>i.id===id); if(it){if(!it.bullets)it.bullets=[];it.bullets.push('');markDirty();renderEditor();} }
function addProjStack(id) {
  const inp=document.getElementById('st-inp-'+id); const v=inp.value.trim(); if(!v)return;
  const it=cvData.projects.find(i=>i.id===id);
  if(it){if(!it.stack)it.stack=[];if(!it.stack.includes(v)){it.stack.push(v);markDirty();renderEditor();}}
}
function removeProjStack(id,tech) { const it=cvData.projects.find(i=>i.id===id); if(it){it.stack=it.stack.filter(s=>s!==tech);markDirty();renderEditor();} }

// ====== DRAG & DROP ======
function bindDragList(listKey) {
  const container=document.getElementById(listKey+'-list'); if(!container)return;
  let dragSrc=null;
  container.querySelectorAll('.card[draggable]').forEach(card=>{
    card.addEventListener('dragstart',e=>{dragSrc=card;setTimeout(()=>card.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{
      card.classList.remove('dragging');
      container.querySelectorAll('.card').forEach(c=>c.classList.remove('drag-over'));
      const newOrder=Array.from(container.querySelectorAll('.card[data-id]')).map(c=>c.dataset.id);
      cvData[listKey]=newOrder.map(id=>cvData[listKey].find(i=>i.id===id)).filter(Boolean);
      markDirty();
    });
    card.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';if(card!==dragSrc)card.classList.add('drag-over');});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault();
      if(dragSrc&&dragSrc!==card){
        const all=Array.from(container.querySelectorAll('.card[data-id]'));
        if(all.indexOf(dragSrc)<all.indexOf(card)) container.insertBefore(dragSrc,card.nextSibling);
        else container.insertBefore(dragSrc,card);
      }
      card.classList.remove('drag-over');
    });
  });
}

// ====== HILFSFUNKTIONEN FUER DIE VORSCHAU ======
function fullUrl(url) {
  if(!url) return '#';
  if(/^(https?:|mailto:)/.test(url)) return url;
  return 'https://'+url;
}

// Rendert ein Foto als CSS-Hintergrund-Div (zuverlaessiger fuer html2canvas als object-fit auf img)
function photoBox(w, h, extraCss) {
  const p = cvData.personal;
  if (!p.photo) return '';
  const br = p.photoShape === 'square' ? '4px' : '50%';
  const zoom = p.photoZoom || 1;
  const posY = (p.photoPosY != null) ? p.photoPosY : 50;
  // Bei bekanntem Seitenverhaeltnis die Cover-Groesse exakt berechnen und mit dem
  // Zoom multiplizieren (zuverlaessig fuer html2canvas). Sonst klassisches "cover".
  let sizeCss;
  if (p.photoAspect && zoom !== 1) {
    const a = p.photoAspect;       // natuerliches Verhaeltnis Breite/Hoehe
    let bgW, bgH;
    if (w / h > a) { bgW = w; bgH = w / a; } else { bgH = h; bgW = h * a; }
    sizeCss = `background-size:${Math.round(bgW * zoom)}px ${Math.round(bgH * zoom)}px;`;
  } else {
    sizeCss = `background-size:cover;`;
  }
  return `<div style="width:${w}px;height:${h}px;border-radius:${br};background-image:url('${p.photo}');${sizeCss}background-position:center ${posY}%;background-repeat:no-repeat;flex-shrink:0;${extraCss||''}"></div>`;
}

// Hilfsfunktion fuer Kontakt-Links
function lnk(href, text) {
  return `<a href="${href}" class="cv-link">${text}</a>`;
}

// Hebt das Portfolio hervor: kompakte, gut sichtbare "Portfolio"-Pille statt
// einer langen, unauffaelligen URL. Reduziert die Textmenge und faellt sofort auf.
// Der eigentliche Link bleibt im href erhalten (auch im PDF anklickbar).
function portfolioLink(url, label) {
  return `<a href="${fullUrl(url)}" class="cv-link cv-portfolio">${label || 'Portfolio'}</a>`;
}

// Kompakter Icon-Link (LinkedIn/GitHub) statt langer URL - spart Platz.
function iconLink(url, svg, label) {
  return `<a href="${fullUrl(url)}" class="cv-link cv-icon" title="${esc(label)}" aria-label="${esc(label)}">${svg}</a>`;
}

// Optionaler, dezenter Projekt-Link (oeffnet das jeweilige Projekt).
function projectLink(url) {
  return `<a href="${fullUrl(url)}" class="cv-link cv-proj-link">↗ Ansehen</a>`;
}

// Sterne-Bewertung (1-5) als gefuellte/leere Sterne. Gefuellte in Akzentblau,
// leere in Hellblau - wie in der Vorlage "Profil Klassisch".
function sterne(level) {
  const n = Math.max(0, Math.min(5, parseInt(level) || 0));
  let s = '';
  for (let i = 1; i <= 5; i++) s += `<span style="color:${i <= n ? '#1d4ed8' : '#bcd0f5'}">&#9733;</span>`;
  return `<span class="pf-stars">${s}</span>`;
}

const A4_PAGE_PX = 1123; // A4-Seitenhoehe bei 96 DPI (794 x 1123)

// Aktuelle Seitenzahl und exakte Gesamthoehe der Vorschau (vom Layout berechnet).
// Der PDF-Export verwendet genau diese Werte, damit Vorschau und PDF identisch
// sind und keine zusaetzliche leere Seite entsteht.
let cvSeitenAnzahl = 1;
let cvGesamthoehePx = A4_PAGE_PX;

// Ermittelt die unterste Kante des TATSAECHLICHEN Inhalts (ohne abschliessendes
// Padding des Templates). So fuehrt ein reiner Padding-Rest nicht faelschlich zu
// einer zusaetzlichen, komplett leeren Seite.
function inhaltsUnterkante(el) {
  const basis = el.getBoundingClientRect();
  let unten = 0;
  el.querySelectorAll('*').forEach(node => {
    // Nur Blattelemente (echtes Inhalts-Ende) zaehlen - Container mit Padding
    // wuerden ihr Padding mitzaehlen und faelschlich eine leere Seite erzeugen.
    if (node.children.length > 0) return;
    if (node.classList && node.classList.contains('pbc')) return;
    const r = node.getBoundingClientRect();
    if (r.height === 0 && r.width === 0) return; // unsichtbare Elemente ignorieren
    const b = r.bottom - basis.top;
    if (b > unten) unten = b;
  });
  return unten;
}

// Sorgt dafuer, dass die Vorschau-Seite immer eine ganze Zahl voller A4-Seiten
// hoch ist. Dadurch ist JEDE Seite vollstaendig weiss - exakt wie das PDF.
function applyPageLayout() {
  const el = document.getElementById('cv-preview');
  const child = el.firstElementChild;
  // Fruehere Markierungen, erzwungene Hoehen, Begrenzung und Abstaende entfernen,
  // um die echte Inhaltshoehe sauber messen zu koennen
  el.querySelectorAll('.pbc').forEach(x => x.remove());
  el.style.minHeight = '';
  el.style.height = '';
  el.style.overflow = '';
  if (child) child.style.minHeight = '';
  // Seitenumbrueche vermeiden: einzelne Zeilen, die eine A4-Grenze kreuzen, auf
  // die naechste Seite schieben - kein abgeschnittener Text
  vermeideSeitenumbrueche(el);
  // Seitenzahl aus der tatsaechlichen Inhalts-Unterkante (ohne Padding) berechnen.
  // Toleranz von 0,01 Seite verhindert eine leere Seite durch winzige Ueberhaenge.
  const unten = inhaltsUnterkante(el);
  cvSeitenAnzahl = Math.max(1, Math.ceil(unten / A4_PAGE_PX - 0.01));
  cvGesamthoehePx = cvSeitenAnzahl * A4_PAGE_PX;
  // Vorschau exakt auf volle Seitenanzahl fixieren; der Padding-Rest unterhalb
  // wird abgeschnitten (es ist nur Leerraum, kein Inhalt) -> keine leere Seite.
  el.style.height = cvGesamthoehePx + 'px';
  el.style.overflow = 'hidden';
  if (child) child.style.minHeight = cvGesamthoehePx + 'px';
  addSeitentrennlinien(cvSeitenAnzahl);
}

// Verschiebt nur die EINZELNE Zeile (Stichpunkt, Titelzeile, Abschnittstitel),
// die genau auf einer A4-Grenze liegt, auf den Anfang der naechsten Seite.
// Dadurch wird keine Textzeile mittendrin abgeschnitten - und es entsteht
// nur minimaler Leerraum (hoechstens etwa eine Zeile), kein verschwendeter Platz.
// Wird top-down angewendet; jede Zeile wird mit frischer Geometrie gemessen.
const ZEILEN_SELEKTOR = [
  '.cv-section-title', '.col-section-title', '.left-section-title',
  '.cv-entry-header', '.cv-entry-sub',
  '.cv-bullets li',
  '.cv-tl-entry', '.cv-tl-title', '.cv-tl-sub',
  '.skill-cat', '.skill-row', '.lang-item', '.pers-item', '.contact-item',
  '.left-skill-cat', '.kn-row',
  '.pf-entry', '.pf-rsection-title', '.pf-section-title', '.pf-data-item', '.pf-lang', '.pf-skill-row'
].join(', ');

// Gilt fuer ALLE Vorlagen (auch mehrspaltige): jede Spalte ist ein eigener Fluss,
// das Verschieben einer Zeile betrifft nur ihre eigene Spalte. So wird in keiner
// Spalte eine Textzeile an einer Seitengrenze abgeschnitten.
//
// Wichtig: Es wird padding-top statt margin-top verwendet. Margin-top wuerde mit
// der margin-bottom des vorherigen Geschwisterelements kollabieren (z. B. 15 px)
// und die Zeile dadurch zu wenig verschieben -> der Text wuerde trotzdem
// abgeschnitten. Padding kollabiert nie und verschiebt exakt um den noetigen Wert.
// Die Funktion ist idempotent (setzt zuvor gesetzte Abstaende zuerst zurueck).
function vermeideSeitenumbrueche(el) {
  const PAGE = A4_PAGE_PX;
  const zeilen = Array.from(el.querySelectorAll(ZEILEN_SELEKTOR));
  zeilen.forEach(z => { z.style.paddingTop = ''; });
  zeilen.forEach(zeile => {
    const basis = el.getBoundingClientRect();
    const r = zeile.getBoundingClientRect();
    const top = r.top - basis.top;
    const bottom = r.bottom - basis.top;
    const hoehe = r.height;
    if (hoehe <= 0 || hoehe >= PAGE) return; // passt nie auf eine Seite
    const seiteOben = Math.floor(top / PAGE);
    const seiteUnten = Math.floor((bottom - 1) / PAGE);
    if (seiteOben !== seiteUnten) {
      const naechsteGrenze = (seiteOben + 1) * PAGE;
      const schub = naechsteGrenze - top + 2; // minimaler Puffer
      zeile.style.paddingTop = schub + 'px';
    }
  });
}

// Zeigt dezente Seitengrenzen-Markierungen an den A4-Grenzen in der Vorschau an.
// Optik wie ein Dokumenteneditor (Word/Google Docs): ein zarter Seitenrand mit
// Schatten, der das Ende einer Seite andeutet - kein alarmierender roter Strich.
// Diese Elemente (.pbc) werden beim PDF-Export temporaer ausgeblendet.
function addSeitentrennlinien(seitenzahl) {
  const el = document.getElementById('cv-preview');
  const seitenhoehe = A4_PAGE_PX;
  for (let seite = 1; seite < seitenzahl; seite++) {
    const y = seite * seitenhoehe;
    // Untere Kante der vorherigen Seite (zarte Linie mit weichem Schatten nach oben)
    const linie = document.createElement('div');
    linie.className = 'pbc';
    linie.style.cssText = `position:absolute;left:0;right:0;top:${y}px;height:0;`
      + `border-top:1px solid rgba(148,163,184,.55);`
      + `box-shadow:0 -6px 10px -6px rgba(15,23,42,.18);`
      + `pointer-events:none;z-index:10;`;
    // Dezentes Seitenlabel, zentriert auf der Trennlinie
    const badge = document.createElement('span');
    badge.className = 'pbc';
    badge.style.cssText = `position:absolute;left:50%;transform:translateX(-50%);top:${y - 10}px;`
      + `background:#64748b;color:#fff;font-size:8.5px;font-weight:600;`
      + `font-family:system-ui,sans-serif;letter-spacing:.3px;padding:2px 10px;`
      + `border-radius:10px;opacity:.85;pointer-events:none;z-index:11;`;
    badge.textContent = `Seite ${seite + 1}`;
    el.appendChild(linie);
    el.appendChild(badge);
  }
}

// Export: aktiver Lebenslauf inkl. Name (Wrapper-Format der Geschaeftslogik).
function exportJSON() {
  if (!currentCvId) return;

    .replace(/[^\w\- ]+/g, '').replace(/\s+/g, '_').toLowerCase() || 'lebenslauf';

// Import: legt einen NEUEN Lebenslauf an (nicht-destruktiv) und wechselt dorthin.
function onJSONFileSelected(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {

      const id = library.importData(parsed);

  };

}

// Pruegt, ob eine Canvas-Zeile (fast) leer/weiss ist - toleriert duenne Linien
// (z. B. die vertikale Trennlinie der Profil-Vorlage).
function istFastLeereZeile(buf, breite, zeile) {
  let nichtWeiss = 0;
  const grenze = Math.max(2, Math.floor(breite * 0.012));
  const basis = zeile * breite * 4;
  for (let i = 0; i < breite; i++) {
    const p = basis + i * 4;
    if (buf[p] < 245 || buf[p + 1] < 245 || buf[p + 2] < 245) {
      nichtWeiss++;
      if (nichtWeiss > grenze) return false;
    }
  }
  return true;
}

// Liefert die Y-Schnittpunkte (Canvas-Pixel) fuer die Seiten. Nahe jeder A4-Grenze
// wird die zur Grenze NAECHSTGELEGENE (fast) leere Zeile gesucht (oberhalb wie
// unterhalb), damit kein Text getrennt wird und sich der Schnitt nicht aufsummiert
// (das wuerde sonst eine fast leere Zusatzseite erzeugen).
function berechneSchnittpunkte(canvas, PAGE_H_PX, skala) {
  const ctx = canvas.getContext('2d');
  const breite = canvas.width;
  const lookback = Math.round(80 * skala);    // Suchbereich oberhalb der Grenze
  const lookforward = Math.round(14 * skala); // kleiner Bereich unterhalb der Grenze
  const cuts = [0];
  let cur = 0;
  while (cur + PAGE_H_PX < canvas.height - 1) {
    const target = cur + PAGE_H_PX;
    const von = Math.max(cur + Math.floor(PAGE_H_PX * 0.5), target - lookback);
    const bis = Math.min(canvas.height, target + lookforward);
    let schnitt = target, bestDist = Infinity;
    try {
      const region = ctx.getImageData(0, von, breite, bis - von).data;
      for (let y = 0; y < bis - von; y++) {
        if (istFastLeereZeile(region, breite, y)) {
          const yc = von + y;
          const d = Math.abs(yc - target);
          if (d < bestDist) { bestDist = d; schnitt = yc; }
        }
      }
    } catch (e) { schnitt = target; }
    if (schnitt <= cur) schnitt = target; // Fortschritt sicherstellen
    cuts.push(schnitt);
    cur = schnitt;
  }
  // Winzigen Rest vermeiden: faellt am Ende nur ein kleiner Streifen an, wird er
  // in die letzte Seite gezogen statt eine fast leere Zusatzseite zu erzeugen.
  const rest = canvas.height - cur;
  if (cuts.length >= 2 && rest <= 0.10 * PAGE_H_PX) {
    cuts[cuts.length - 1] = canvas.height;
  } else {
    cuts.push(canvas.height);
  }
  return cuts;
}

// ====== KLICKBARE LINKS IM PDF ======
// Ordnet jeden Link der richtigen Seite zu - auf Basis der tatsaechlichen
// Schnittpunkte (Seiten koennen leicht unterschiedlich hoch sein).
function addClickableLinks(pdf, previewEl, cuts, skala, pxPerMM) {
  const mmPerPxLive = 210 / previewEl.offsetWidth;
  const containerRect = previewEl.getBoundingClientRect();
  const seiten = pdf.internal.getNumberOfPages();

  previewEl.querySelectorAll('a[href]').forEach(link => {
    const href = link.getAttribute('href');
    if (!href || href === '#') return;
    const r = link.getBoundingClientRect();
    const relTop = r.top - containerRect.top;
    const relLeft = r.left - containerRect.left;
    const yCanvas = relTop * skala;
    // Seite anhand der Schnittpunkte bestimmen
    let seite = 0;
    for (let i = 0; i < cuts.length - 1; i++) {
      if (yCanvas >= cuts[i] && yCanvas < cuts[i + 1]) { seite = i; break; }
      if (i === cuts.length - 2) seite = i;
    }
    const x = relLeft * mmPerPxLive;
    const y = (yCanvas - cuts[seite]) / pxPerMM;
    const w = Math.max(r.width * mmPerPxLive, 10);
    const h = Math.max(r.height * mmPerPxLive, 4);
    if (seite >= 0 && seite < seiten) {
      pdf.setPage(seite + 1);
      pdf.link(x, y, w, h, { url: href });
    }
  });

  if (seiten > 0) pdf.setPage(seiten);
}

// ====== PDF-EXPORT ======
async function exportPDF() {
  const btn = document.getElementById('pdf-btn');
  const origText = btn.textContent;
  btn.textContent = 'Bitte warten...'; btn.disabled = true;

  const el = document.getElementById('cv-preview');
  // Seitentrennlinien beim Capture ausblenden
  el.querySelectorAll('.pbc').forEach(x => x.style.display = 'none');

  // html2canvas loest currentColor in Inline-SVGs nicht auf -> Icons koennten
  // schwarz/unsichtbar werden (v. a. auf dunklen Vorlagen). Daher die echte
  // Textfarbe vor dem Capture fest in die SVGs schreiben und danach zuruecksetzen.
  const iconSvgs = el.querySelectorAll('.cv-icon svg');
  iconSvgs.forEach(svg => {
    const col = getComputedStyle(svg.parentElement).color;
    svg.dataset.prevFill = svg.style.fill || '';
    svg.style.fill = col;
  });

  try {
    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 300));

    // Breite immer exakt 794px (A4 bei 96 DPI), nie el.scrollWidth verwenden
    // windowWidth auf normalen Viewport setzen - verhindert Verzerrungen durch flex/grid
    // Exakt die vom Layout berechnete Gesamthoehe verwenden (volle Seiten),
    // nie el.scrollHeight - so entsteht keine zusaetzliche leere Seite.
    const captureHoehe = cvGesamthoehePx;
    // Hohe Aufloesung fuer scharfe Schrift UND scharfe Fotos. Der Faktor wird so
    // begrenzt, dass die maximale Canvas-Groesse (ca. 16384 px) nicht ueberschritten
    // wird - dadurch bleibt die Bildqualitaet auch bei langen Lebenslaeufen erhalten.
    const MAX_CANVAS = 16000;
    const skala = Math.max(2, Math.min(3, MAX_CANVAS / captureHoehe));
    const canvas = await html2canvas(el, {
      scale: skala,
      useCORS: true,
      allowTaint: true,
      logging: false,
      imageTimeout: 0,
      backgroundColor: '#ffffff',
      width: 794,
      height: captureHoehe,
      windowWidth: 1200,
      windowHeight: Math.max(captureHoehe, 900),
      x: 0, y: 0, scrollX: 0, scrollY: 0
    });

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    const PAGE_W_MM = 210;
    const PAGE_H_MM = 297;
    const PAGE_W_PX = canvas.width;
    const PAGE_H_PX = Math.round(PAGE_W_PX * PAGE_H_MM / PAGE_W_MM);
    const pxPerMM = PAGE_W_PX / PAGE_W_MM;

    // Schnittpunkte bestimmen: nahe jeder A4-Grenze die naechste (fast) leere
    // Zeile suchen und dort schneiden. So wird selbst bei kleinen html2canvas-
    // Abweichungen nie eine Textzeile durchschnitten (die Vorschau kann leicht
    // anders umbrechen als der Canvas).
    const cuts = berechneSchnittpunkte(canvas, PAGE_H_PX, skala);

    for (let i = 0; i < cuts.length - 1; i++) {
      if (i > 0) pdf.addPage();
      const startPX = cuts[i];
      const sliceH = cuts[i + 1] - cuts[i];
      const sliceHeightMM = sliceH / pxPerMM;

      const slice = document.createElement('canvas');
      slice.width = PAGE_W_PX;
      slice.height = sliceH;
      const ctx = slice.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, slice.width, slice.height);
      ctx.drawImage(canvas, 0, startPX, PAGE_W_PX, sliceH, 0, 0, PAGE_W_PX, sliceH);

      pdf.addImage(slice.toDataURL('image/png'), 'PNG', 0, 0, PAGE_W_MM, sliceHeightMM);
    }

    // Klickbare Links als PDF-Annotationen hinzufuegen (an die Schnittpunkte angepasst)
    addClickableLinks(pdf, el, cuts, skala, pxPerMM);

    const name = (cvData.personal.name || 'Lebenslauf').replace(/\s+/g, '_');
    pdf.save(`${name}_Lebenslauf.pdf`);
  } catch(err) {
    alert('PDF-Exportfehler: ' + err.message);
  } finally {
    // Seitentrennlinien immer wiederherstellen, auch im Fehlerfall
    el.querySelectorAll('.pbc').forEach(x => x.style.display = '');
    // SVG-Icon-Farben zuruecksetzen (currentColor wieder aktiv fuer den Bildschirm)
    iconSvgs.forEach(svg => { svg.style.fill = svg.dataset.prevFill || ''; });
  }

  btn.textContent = origText; btn.disabled = false;
}

// ====== HILFSWERKZEUGE ======
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(str) { return (str||'').replace(/'/g,"\\'"); }
function uid() { return Math.random().toString(36).substr(2,8); }

// ====== INITIALISIERUNG ======
window.addEventListener('DOMContentLoaded', () => {
  // Bibliothek aufbauen (vorhandene CVs / Migration / leerer CV) und aktiven CV laden
  initLibrary();
  const sel = document.getElementById('template-select');
  if (sel) sel.value = cvData.template || 'minimal';
  renderCvBar();
  renderEditor();
  renderPreview();
  applyFont();
  // Layout nach vollstaendigem Laden der Schriftarten neu berechnen: vorher
  // koennen abweichende Schriftmasse die Seitenumbruch-Berechnung verfaelschen.
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => { applyPageLayout(); });
  }
  // Zusaetzliche Sicherheits-Neuberechnung, falls Bilder/Reflows spaeter eintreffen
  setTimeout(() => { applyPageLayout(); }, 400);
});
</script>
